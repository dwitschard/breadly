<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <!-- Base background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#f9fafb"/>
    </linearGradient>

    <!-- Dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.2" fill="#2563eb" fill-opacity="0.12"/>
    </pattern>

    <!-- Radial glow for orbs -->
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base fill -->
  <rect width="1440" height="900" fill="url(#bg)"/>

  <!-- Dot grid overlay -->
  <rect width="1440" height="900" fill="url(#dots)"/>

  <!-- Animated ambient orbs -->
  <!-- Orb 1: top-left, slow drift -->
  <ellipse cx="260" cy="200" rx="380" ry="320" fill="url(#orb1)">
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0,0; 30,20; -15,35; 0,0"
      dur="18s"
      repeatCount="indefinite"/>
  </ellipse>

  <!-- Orb 2: bottom-right, counter drift -->
  <ellipse cx="1200" cy="720" rx="420" ry="340" fill="url(#orb2)">
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0,0; -25,15; 20,-30; 0,0"
      dur="22s"
      repeatCount="indefinite"/>
  </ellipse>

  <!-- Orb 3: center-right, subtle pulse -->
  <ellipse cx="1050" cy="280" rx="300" ry="260" fill="url(#orb3)">
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0,0; 15,-20; -10,25; 0,0"
      dur="26s"
      repeatCount="indefinite"/>
  </ellipse>

  <!-- Subtle diagonal lines (top-right accent) -->
  <g stroke="#2563eb" stroke-opacity="0.05" stroke-width="1">
    <line x1="900" y1="0" x2="1440" y2="540"/>
    <line x1="960" y1="0" x2="1440" y2="480"/>
    <line x1="1020" y1="0" x2="1440" y2="420"/>
    <line x1="1080" y1="0" x2="1440" y2="360"/>
    <line x1="1140" y1="0" x2="1440" y2="300"/>
    <line x1="1200" y1="0" x2="1440" y2="240"/>
    <line x1="1260" y1="0" x2="1440" y2="180"/>
    <line x1="1320" y1="0" x2="1440" y2="120"/>
    <line x1="1380" y1="0" x2="1440" y2="60"/>
  </g>

  <!-- Floating rings -->
  <circle cx="180" cy="680" r="90" fill="none" stroke="#2563eb" stroke-opacity="0.07" stroke-width="1.5">
    <animate attributeName="r" values="90;100;90" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.07;0.04;0.07" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="680" r="130" fill="none" stroke="#2563eb" stroke-opacity="0.04" stroke-width="1">
    <animate attributeName="r" values="130;144;130" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.04;0.02;0.04" dur="10s" repeatCount="indefinite"/>
  </circle>

  <circle cx="1320" cy="160" r="70" fill="none" stroke="#6366f1" stroke-opacity="0.07" stroke-width="1.5">
    <animate attributeName="r" values="70;80;70" dur="13s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.07;0.04;0.07" dur="13s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1320" cy="160" r="110" fill="none" stroke="#6366f1" stroke-opacity="0.04" stroke-width="1">
    <animate attributeName="r" values="110;124;110" dur="13s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.04;0.02;0.04" dur="13s" repeatCount="indefinite"/>
  </circle>
</svg>
