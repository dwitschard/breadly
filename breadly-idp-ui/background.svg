<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <!-- warm-300 → warm-200 — visibly parchment, not near-white -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D6CFC4"/>
      <stop offset="100%" stop-color="#E9E4DC"/>
    </linearGradient>

    <!-- brand-on (amber-950 #451a03) dots -->
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.4" fill="#451a03" fill-opacity="0.14"/>
    </pattern>

    <!-- Orb 1: brand / amber-600 warm glow, upper-left -->
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D97706" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0"/>
    </radialGradient>
    <!-- Orb 2: brand-hover / amber-700 deep, lower-right -->
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B45309" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#B45309" stop-opacity="0"/>
    </radialGradient>
    <!-- Orb 3: brand / amber-600 accent, upper-right -->
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D97706" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>
  <rect width="1440" height="900" fill="url(#dots)"/>

  <!-- Orbs: warm amber glows positioned at corners/edges -->
  <ellipse cx="220" cy="180" rx="400" ry="340" fill="url(#orb1)"/>
  <ellipse cx="1240" cy="740" rx="440" ry="360" fill="url(#orb2)"/>
  <ellipse cx="1080" cy="240" rx="320" ry="280" fill="url(#orb3)"/>

  <!-- Diagonal ruled lines — brand-on / amber-950 -->
  <g stroke="#451a03" stroke-opacity="0.07" stroke-width="1">
    <line x1="900" y1="0" x2="1440" y2="540"/>
    <line x1="960" y1="0" x2="1440" y2="480"/>
    <line x1="1020" y1="0" x2="1440" y2="420"/>
    <line x1="1080" y1="0" x2="1440" y2="360"/>
    <line x1="1140" y1="0" x2="1440" y2="300"/>
    <line x1="1200" y1="0" x2="1440" y2="240"/>
    <line x1="1260" y1="0" x2="1440" y2="180"/>
    <line x1="1320" y1="0" x2="1440" y2="120"/>
    <line x1="1380" y1="0" x2="1440" y2="60"/>
  </g>

  <!-- Concentric rings — brand-hover / amber-700 -->
  <circle cx="180" cy="680" r="90"  fill="none" stroke="#B45309" stroke-opacity="0.10" stroke-width="1.5"/>
  <circle cx="180" cy="680" r="130" fill="none" stroke="#B45309" stroke-opacity="0.06" stroke-width="1"/>
  <circle cx="1320" cy="160" r="70"  fill="none" stroke="#B45309" stroke-opacity="0.10" stroke-width="1.5"/>
  <circle cx="1320" cy="160" r="110" fill="none" stroke="#B45309" stroke-opacity="0.06" stroke-width="1"/>
</svg>
