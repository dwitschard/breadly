version: '3.9'
services:
  db:
    image: mongo:8
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: breadly
      MONGO_INITDB_ROOT_PASSWORD: breadlypass
      MONGO_INITDB_DATABASE: breadlydb
    ports:
      - "27017:27017"
    volumes:
      - db_data:/data/db

volumes:
  db_data:
