openapi: 3.1.0
info:
  title: Breadly API
  description: REST API contract for the Breadly application
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Local development server

paths:
  /public/config:
    get:
      operationId: getPublicConfig
      summary: Get environment-specific configuration
      description: Returns public runtime configuration values (e.g. OIDC issuer and client ID). No authentication required.
      tags:
        - Public
      responses:
        '200':
          description: Configuration retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicConfig'
        '503':
          description: Configuration not available (environment variables not set)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /recipes:
    get:
      operationId: getRecipes
      summary: List all recipes
      description: Returns all recipes for the authenticated user.
      tags:
        - Recipes
      responses:
        '200':
          description: A list of recipes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Recipe'

    post:
      operationId: createRecipe
      summary: Create a new recipe
      description: Creates a new recipe with the provided data.
      tags:
        - Recipes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecipeDto'
      responses:
        '201':
          description: Recipe created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recipe'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /recipes/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: MongoDB ObjectId of the recipe
        schema:
          type: string

    get:
      operationId: getRecipeById
      summary: Get a recipe by ID
      description: Returns a single recipe identified by its MongoDB ObjectId.
      tags:
        - Recipes
      responses:
        '200':
          description: The recipe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recipe'
        '404':
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      operationId: replaceRecipe
      summary: Fully replace a recipe
      description: Replaces all fields of an existing recipe with the provided data.
      tags:
        - Recipes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRecipeDto'
      responses:
        '200':
          description: Recipe replaced successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recipe'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      operationId: updateRecipe
      summary: Partially update a recipe
      description: Updates only the provided fields of an existing recipe.
      tags:
        - Recipes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchRecipeDto'
      responses:
        '200':
          description: Recipe updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recipe'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      operationId: deleteRecipe
      summary: Delete a recipe
      description: Permanently deletes a recipe identified by its MongoDB ObjectId.
      tags:
        - Recipes
      responses:
        '204':
          description: Recipe deleted successfully
        '404':
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /profile:
    get:
      operationId: getProfile
      summary: Get the authenticated user's profile
      description: Returns profile information derived from the authenticated user's JWT claims, including stored settings.
      tags:
        - Profile
      responses:
        '200':
          description: Profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /profile/settings:
    get:
      operationId: getUserSettings
      summary: Get the authenticated user's settings
      description: Returns the stored language and theme preference. Creates and persists defaults if no record exists.
      tags:
        - Profile
      responses:
        '200':
          description: Settings retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      operationId: updateUserSettings
      summary: Update the authenticated user's settings
      description: Partially updates language and/or theme preference. Invalid values are rejected with 400.
      tags:
        - Profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchUserSettingsDto'
      responses:
        '200':
          description: Settings updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsDto'
        '400':
          description: Invalid language or theme value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reminders:
    get:
      operationId: getReminders
      summary: List reminders
      description: Returns all reminders for the authenticated user, including fired reminders marked as disabled.
      tags:
        - Reminders
      responses:
        '200':
          description: A list of reminders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReminderList'

    post:
      operationId: createReminder
      summary: Create a new reminder
      description: Schedules a one-time reminder for a recipe at the specified date and time. Enforces a soft limit of 10 active reminders per user.
      tags:
        - Reminders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReminderDto'
      responses:
        '201':
          description: Reminder created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reminder'
        '400':
          description: Invalid request body or scheduledAt is in the past
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Per-user reminder limit reached (max 10)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reminders/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: The reminder ID (EventBridge schedule name)
        schema:
          type: string

    delete:
      operationId: deleteReminder
      summary: Cancel a reminder
      description: Cancels and deletes a reminder. Only the owner can delete their reminders.
      tags:
        - Reminders
      responses:
        '204':
          description: Reminder deleted successfully
        '403':
          description: Not authorized to delete this reminder
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Reminder not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /internal/reminders/send:
    post:
      operationId: sendReminder
      summary: Send a single reminder email
      description: Internal endpoint called by EventBridge Scheduler to send a one-time reminder email. Secured by API Gateway IAM auth.
      tags:
        - Internal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendReminderPayload'
      responses:
        '200':
          description: Reminder email sent successfully
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /internal/reminders/batch:
    post:
      operationId: sendBatchReminders
      summary: Send batch reminder emails
      description: Internal endpoint called by EventBridge Scheduler for recurring batch jobs (e.g. daily greeting). Secured by API Gateway IAM auth.
      tags:
        - Internal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchReminderPayload'
      responses:
        '200':
          description: Batch emails sent successfully
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /health:
    get:
      operationId: getHealth
      summary: Get system health status
      description: Returns the health status of the API and its dependencies.
      tags:
        - Operations
      responses:
        '200':
          description: Health status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /version:
    get:
      operationId: getVersion
      summary: Get build version information
      description: Returns the build version (git short SHA) and a link to the corresponding GitHub release. No authentication required.
      tags:
        - Operations
      responses:
        '200':
          description: Version information retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionInfo'

components:
  schemas:
    Recipe:
      type: object
      required:
        - name
      properties:
        _id:
          type: string
          description: MongoDB ObjectId (string representation)
          readOnly: true
        name:
          type: string
          description: Name of the recipe
          minLength: 1

    CreateRecipeDto:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Name of the recipe
          minLength: 1

    UpdateRecipeDto:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Name of the recipe
          minLength: 1

    PatchRecipeDto:
      type: object
      properties:
        name:
          type: string
          description: Name of the recipe
          minLength: 1

    Profile:
      type: object
      required:
        - sub
        - email
        - emailVerified
        - name
        - roles
        - settings
      properties:
        sub:
          type: string
          description: Subject identifier (unique user ID)
        email:
          type: string
          description: User's email address
        emailVerified:
          type: boolean
          description: Whether the email address has been verified
        name:
          type: string
          description: User's full display name
        givenName:
          type: string
          description: User's first name
        familyName:
          type: string
          description: User's last name
        picture:
          type: string
          description: URL to the user's profile picture
        roles:
          type: array
          items:
            type: string
          description: List of roles assigned to the user
        settings:
          $ref: '#/components/schemas/UserSettingsDto'

    UserSettingsDto:
      type: object
      required:
        - language
        - theme
      properties:
        language:
          type: string
          enum:
            - de
            - en
          description: Display language preference
        theme:
          type: string
          enum:
            - light
            - dark
          description: UI theme preference

    PatchUserSettingsDto:
      type: object
      properties:
        language:
          type: string
          enum:
            - de
            - en
          description: Display language preference
        theme:
          type: string
          enum:
            - light
            - dark
          description: UI theme preference

    HealthResponse:
      type: object
      required:
        - status
        - checks
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
          description: Overall system health status
        checks:
          type: object
          required:
            - api
            - mongodb
            - dynamodb
          properties:
            api:
              $ref: '#/components/schemas/HealthCheck'
            mongodb:
              $ref: '#/components/schemas/HealthCheck'
            dynamodb:
              $ref: '#/components/schemas/HealthCheck'

    HealthCheck:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
          description: Status of this individual check
        responseTime:
          type: string
          description: Response time of the check

    CreateReminderDto:
      type: object
      required:
        - recipeId
        - scheduledAt
      properties:
        recipeId:
          type: string
          description: ID of the recipe this reminder is for
        scheduledAt:
          type: string
          description: ISO 8601 datetime with UTC offset (e.g. 2026-04-25T15:00:00+02:00)
        title:
          type: string
          description: Optional title for the reminder
        message:
          type: string
          description: Optional message for the reminder

    Reminder:
      type: object
      required:
        - id
        - recipeId
        - scheduledAt
        - status
      properties:
        id:
          type: string
          description: The EventBridge schedule name (unique identifier)
        recipeId:
          type: string
          description: ID of the recipe this reminder is for
        scheduledAt:
          type: string
          description: ISO 8601 datetime when the reminder will fire
        title:
          type: string
          description: Optional title for the reminder
        message:
          type: string
          description: Optional message for the reminder
        status:
          type: string
          enum:
            - active
            - disabled
          description: active = upcoming; disabled = already fired

    ReminderList:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Reminder'
        nextToken:
          type: string
          description: Cursor token for fetching the next page of results

    SendReminderPayload:
      type: object
      required:
        - recipientEmail
        - recipeId
        - recipeName
      properties:
        recipientEmail:
          type: string
          description: Email address of the recipient
        recipeId:
          type: string
          description: ID of the recipe
        recipeName:
          type: string
          description: Name of the recipe for the email content
        title:
          type: string
          description: Optional reminder title
        message:
          type: string
          description: Optional reminder message
        appUrl:
          type: string
          description: Base URL of the application for links in the email
        userId:
          type: string
          description: Cognito sub of the reminder owner (used to update DynamoDB shadow record)
        scheduleId:
          type: string
          description: EventBridge schedule name (used to update DynamoDB shadow record)

    BatchReminderPayload:
      type: object
      required:
        - type
        - userIds
      properties:
        type:
          type: string
          description: Type of batch job (e.g. "greeting")
        template:
          type: string
          description: Email template name to use (defaults to the value of "type" if omitted)
        subject:
          type: string
          description: Email subject line (defaults to a generic subject if omitted)
        userIds:
          type: array
          items:
            type: string
          description: Explicit list of user IDs to target

    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Human-readable error description
        statusCode:
          type: integer
          description: HTTP status code

    VersionInfo:
      type: object
      required:
        - version
        - releaseUrl
      properties:
        version:
          type: string
          description: Git short SHA identifying the build
        releaseUrl:
          type: string
          description: URL to the corresponding GitHub release

    PublicConfig:
      type: object
      required:
        - idp
        - environment
      properties:
        environment:
          type: string
          description: Deployment environment name (e.g. 'local', 'dev', 'preview-feature-x'). Value is 'prod' in production.
        idp:
          type: object
          required:
            - issuer
            - clientId
          properties:
            issuer:
              type: string
              description: OIDC issuer URL
            clientId:
              type: string
              description: OIDC client ID
