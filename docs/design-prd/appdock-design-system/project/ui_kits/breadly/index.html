<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Breadly</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="../../components.css">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; padding: 0; min-height: 100vh; background: var(--bg); }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="../_shared/components.jsx"></script>
<script type="text/babel" src="./RecipeList.jsx"></script>
<script type="text/babel" src="./Scheduler.jsx"></script>
<script type="text/babel" src="./AddRecipe.jsx"></script>

<script type="text/babel">
  const { useState } = React;

  function App() {
    // route: 'list' | 'empty' | 'add' | 'scheduler'
    const [route, setRoute] = useState("list");
    const [activeRecipe, setActiveRecipe] = useState(null);

    let body, label;
    if (route === "empty")     { body = <EmptyState onAdd={() => setRoute("add")} />; label = "01 Empty"; }
    else if (route === "add")  { body = <AddRecipe onCancel={() => setRoute("list")} onSave={() => setRoute("list")} />; label = "03 Add recipe"; }
    else if (route === "scheduler") { body = <Scheduler recipe={activeRecipe} onBack={() => setRoute("list")} />; label = "04 Scheduler"; }
    else {
      body = (
        <div style={{ maxWidth: 920, margin: "0 auto", padding: "32px 24px 120px" }}>
          <RecipeList
            onOpen={(r) => { setActiveRecipe(r); setRoute("scheduler"); }}
            onNew={() => setRoute("add")}
          />
        </div>
      );
      label = "02 Recipe list";
    }

    return (
      <div className="breadly" data-screen-label={label}>
        <TopBar
          brand={
            <div style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}
                 onClick={() => setRoute("list")}>
              <BreadlyLoaf size={22} color="var(--breadly-accent)" />
              <span style={{ fontSize: 15, fontWeight: 500 }}>Breadly</span>
            </div>
          }
          right={
            <>
              <button className="ad-btn ad-btn-quiet ad-btn-sm" onClick={() => setRoute("empty")}>
                Empty state
              </button>
              <button className="ad-btn ad-btn-quiet ad-btn-sm" onClick={() => setRoute("list")}>
                Reset
              </button>
              <div style={{
                width: 32, height: 32, borderRadius: 99, border: "1px solid var(--border)",
                background: "var(--accent-soft)", color: "var(--accent-press)",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontWeight: 500, fontSize: 13,
              }}>L</div>
            </>
          }
        />
        {body}
        <DockBar activeId="breadly" onSelect={() => {}} />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
