<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>AppDock — Shell</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="../../components.css">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; padding: 0; min-height: 100vh; background: var(--bg); }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="../_shared/components.jsx"></script>
<script type="text/babel" src="./Screens.jsx"></script>

<script type="text/babel">
  const { useState } = React;

  function App() {
    // route: 'login' | 'launcher' | 'account' | 'app:<id>'
    const [route, setRoute] = useState("launcher");
    const isAuthed = route !== "login";
    const activeAppId = route.startsWith("app:") ? route.slice(4) : null;

    let body;
    if (route === "login") {
      body = <LoginScreen onSignIn={() => setRoute("launcher")} />;
    } else if (route === "account") {
      body = <AccountScreen onBack={() => setRoute("launcher")} />;
    } else if (activeAppId) {
      body = (
        <div style={{ maxWidth: 720, margin: "0 auto", padding: "48px 24px 120px", textAlign: "center" }}>
          <h2 className="ad-h2" style={{ marginBottom: 8 }} data-screen-label={`App · ${activeAppId}`}>
            Inside the {activeAppId} app
          </h2>
          <p className="ad-p" style={{ color: "var(--fg-muted)" }}>
            The shell hands the viewport to the active app. See the Breadly UI kit for the real surface.
          </p>
          <div style={{ marginTop: 16 }}>
            <Button variant="ghost" onClick={() => setRoute("launcher")}>Back to launcher</Button>
          </div>
        </div>
      );
    } else {
      body = <LauncherScreen onOpenApp={(id) => setRoute(`app:${id}`)} />;
    }

    const screenLabel =
      route === "login" ? "01 Login" :
      route === "account" ? "03 Account" :
      activeAppId ? `04 App · ${activeAppId}` : "02 Launcher";

    return (
      <div data-screen-label={screenLabel}>
        {isAuthed ? (
          <TopBar
            brand={
              <div style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}
                   onClick={() => setRoute("launcher")}>
                <AppDockMark size={22} color="var(--accent-press)" />
                <span style={{ fontSize: 15, fontWeight: 500 }}>AppDock</span>
              </div>
            }
            right={
              <>
                <button className="ad-btn ad-btn-quiet ad-btn-sm" onClick={() => setRoute("login")}>
                  <Icon name="log-out" size={14} /> Sign out
                </button>
                <button onClick={() => setRoute("account")} style={{
                  width: 32, height: 32, borderRadius: 99, border: "1px solid var(--border)",
                  background: "var(--accent-soft)", color: "var(--accent-press)",
                  fontWeight: 500, fontSize: 13, cursor: "pointer",
                }}>L</button>
              </>
            }
          />
        ) : null}
        {body}
        {isAuthed ? <DockBar activeId={activeAppId} onSelect={(id) => setRoute(`app:${id}`)} /> : null}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
