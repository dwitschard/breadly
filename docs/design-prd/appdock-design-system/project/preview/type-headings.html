<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type · Display & headings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px 22px; background: var(--bg); }
  .row { display: grid; grid-template-columns: 64px 1fr; gap: 14px; align-items: baseline; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: 0; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); letter-spacing: 0.04em; }
</style>
</head>
<body>
  <div class="row"><span class="meta">40 / 500</span><div class="ad-display">A patient oven</div></div>
  <div class="row"><span class="meta">32 / 500</span><h1 class="ad-h1">Set ready by 6:30</h1></div>
  <div class="row"><span class="meta">24 / 500</span><h2 class="ad-h2">Bulk fermentation</h2></div>
  <div class="row"><span class="meta">20 / 500</span><h3 class="ad-h3">Country sourdough</h3></div>
</body></html>
