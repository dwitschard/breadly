<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Color · Amber ramp</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px; background: var(--bg); }
  .row { display: grid; grid-template-columns: repeat(11, 1fr); gap: 6px; }
  .swatch { aspect-ratio: 1.2; border-radius: 8px; border: 1px solid var(--border); position: relative; overflow: hidden; }
  .swatch .label { position: absolute; left: 6px; bottom: 5px; font-family: var(--font-mono); font-size: 10px; color: var(--fg); mix-blend-mode: difference; opacity: 0.85; }
  .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .head .t { font-weight: 500; font-size: 13px; color: var(--fg); }
  .head .s { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); }
</style>
</head>
<body>
  <div class="head"><div class="t">Amber ramp</div><div class="s">--amber-50 → 950</div></div>
  <div class="row">
    <div class="swatch" style="background:var(--amber-50)"><span class="label">50</span></div>
    <div class="swatch" style="background:var(--amber-100)"><span class="label">100</span></div>
    <div class="swatch" style="background:var(--amber-200)"><span class="label">200</span></div>
    <div class="swatch" style="background:var(--amber-300)"><span class="label">300</span></div>
    <div class="swatch" style="background:var(--amber-400)"><span class="label">400</span></div>
    <div class="swatch" style="background:var(--amber-500); outline: 2px solid var(--fg); outline-offset: -4px;"><span class="label" style="color:#000">500★</span></div>
    <div class="swatch" style="background:var(--amber-600)"><span class="label" style="color:#fff;mix-blend-mode:normal">600</span></div>
    <div class="swatch" style="background:var(--amber-700)"><span class="label" style="color:#fff;mix-blend-mode:normal">700</span></div>
    <div class="swatch" style="background:var(--amber-800)"><span class="label" style="color:#fff;mix-blend-mode:normal">800</span></div>
    <div class="swatch" style="background:var(--amber-900)"><span class="label" style="color:#fff;mix-blend-mode:normal">900</span></div>
    <div class="swatch" style="background:var(--amber-950)"><span class="label" style="color:#fff;mix-blend-mode:normal">950</span></div>
  </div>
</body></html>
