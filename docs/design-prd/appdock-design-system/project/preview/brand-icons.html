<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brand · iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { margin: 0; padding: 18px; background: var(--bg); }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 8px 4px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-elevated); }
  .cell svg { width: 22px; height: 22px; color: var(--fg); stroke-width: 1.5; }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); margin-bottom: 8px; }
</style>
</head>
<body>
  <div class="meta">Lucide · 1.5 stroke · round caps · 24 viewbox</div>
  <div class="grid">
    <div class="cell"><i data-lucide="cookie"></i><span class="name">cookie</span></div>
    <div class="cell"><i data-lucide="calendar"></i><span class="name">calendar</span></div>
    <div class="cell"><i data-lucide="clock"></i><span class="name">clock</span></div>
    <div class="cell"><i data-lucide="thermometer"></i><span class="name">thermo</span></div>
    <div class="cell"><i data-lucide="droplet"></i><span class="name">droplet</span></div>
    <div class="cell"><i data-lucide="scale"></i><span class="name">scale</span></div>
    <div class="cell"><i data-lucide="plus"></i><span class="name">plus</span></div>
    <div class="cell"><i data-lucide="settings"></i><span class="name">settings</span></div>
    <div class="cell"><i data-lucide="user"></i><span class="name">user</span></div>
    <div class="cell"><i data-lucide="bell"></i><span class="name">bell</span></div>
    <div class="cell"><i data-lucide="search"></i><span class="name">search</span></div>
    <div class="cell"><i data-lucide="check"></i><span class="name">check</span></div>
    <div class="cell"><i data-lucide="x"></i><span class="name">x</span></div>
    <div class="cell"><i data-lucide="chevron-right"></i><span class="name">chev-r</span></div>
    <div class="cell"><i data-lucide="more-horizontal"></i><span class="name">more</span></div>
    <div class="cell"><i data-lucide="play"></i><span class="name">play</span></div>
  </div>
  <script>lucide.createIcons();</script>
</body></html>
