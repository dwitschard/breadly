<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type · Mono</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px 22px; background: var(--bg); }
  .row { display: grid; grid-template-columns: 90px 1fr; gap: 14px; align-items: baseline; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: 0; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); letter-spacing: 0.04em; }
  .big { font-family: var(--font-mono); font-size: 28px; font-weight: 500; color: var(--fg); }
  .mid { font-family: var(--font-mono); font-size: 16px; color: var(--fg); }
  .sm  { font-family: var(--font-mono); font-size: 12px; color: var(--fg-muted); }
</style>
</head>
<body>
  <div class="row"><span class="meta">28 mono / 500</span><div class="big">2 h 14 m 03 s</div></div>
  <div class="row"><span class="meta">16 mono / 400</span><div class="mid">75.0 % hydration</div></div>
  <div class="row"><span class="meta">12 mono / 400</span><div class="sm">flour 850 g · water 638 g · salt 18 g</div></div>
</body></html>
