<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Pills & badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg); display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); width: 80px; }
</style>
</head>
<body>
  <div class="row"><span class="lbl">amber</span>
    <span class="ad-pill">75 % hydration</span>
    <span class="ad-pill">Sourdough</span>
    <span class="ad-pill">2 loaves</span>
  </div>
  <div class="row"><span class="lbl">neutral</span>
    <span class="ad-pill ad-pill-neutral">draft</span>
    <span class="ad-pill ad-pill-neutral">scheduled</span>
    <span class="ad-pill ad-pill-neutral">archived</span>
  </div>
</body></html>
