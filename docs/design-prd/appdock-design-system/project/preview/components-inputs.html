<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg); display: flex; flex-direction: column; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .lbl { font-family: var(--font-sans); font-size: 13px; font-weight: 500; color: var(--fg); }
  .focused { outline: 2px solid var(--accent-ring); outline-offset: 2px; border-color: var(--accent); }
</style>
</head>
<body>
  <div class="field">
    <label class="lbl">Recipe name</label>
    <input class="ad-input" placeholder="e.g. Country sourdough" value="Country sourdough">
  </div>
  <div class="field">
    <label class="lbl">Ready by</label>
    <input class="ad-input focused" value="Saturday, 6:30 AM">
  </div>
</body></html>
