<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Motion · Easing & durations</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px; background: var(--bg); }
  .row { display: grid; grid-template-columns: 90px 1fr 70px; gap: 12px; align-items: center; padding: 6px 0; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); }
  .track { height: 8px; background: var(--bg-sunken); border-radius: 99px; overflow: hidden; position: relative; }
  .ball { position: absolute; top: -3px; width: 14px; height: 14px; background: var(--amber-500); border-radius: 99px; left: 0; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); text-align: right; }

  @media (prefers-reduced-motion: no-preference) {
    .b1 { animation: run1 1500ms cubic-bezier(0.4, 0, 0.2, 1) infinite; }
    .b2 { animation: run1 1800ms cubic-bezier(0.22, 1, 0.36, 1) infinite; }
    .b3 { animation: run1 2400ms cubic-bezier(0.4, 0, 1, 1) infinite; }
  }
  @keyframes run1 {
    0%, 10% { left: 0; }
    50%, 60% { left: calc(100% - 14px); }
    100% { left: 0; }
  }
</style>
</head>
<body>
  <div class="row"><span class="name">--ease-standard</span><div class="track"><div class="ball b1"></div></div><span class="meta">.4 0 .2 1</span></div>
  <div class="row"><span class="name">--ease-out-soft</span><div class="track"><div class="ball b2"></div></div><span class="meta">.22 1 .36 1</span></div>
  <div class="row"><span class="name">--ease-in</span><div class="track"><div class="ball b3"></div></div><span class="meta">.4 0 1 1</span></div>
  <div style="display:flex;gap:14px;font-family:var(--font-mono);font-size:11px;color:var(--fg-muted);margin-top:10px;flex-wrap:wrap">
    <span>tick 80ms</span><span>fast 150ms</span><span>base 220ms</span><span>slow 400ms</span><span>ripple 600ms</span>
  </div>
</body></html>
