<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type · Body & support</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px 22px; background: var(--bg); }
  .row { display: grid; grid-template-columns: 64px 1fr; gap: 14px; align-items: baseline; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: 0; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); letter-spacing: 0.04em; }
</style>
</head>
<body>
  <div class="row"><span class="meta">18 / 500</span><div style="font-size:18px;font-weight:500">Recipe name (card)</div></div>
  <div class="row"><span class="meta">16 / 400</span><p class="ad-p">Body — sets a calm, plainspoken tone.</p></div>
  <div class="row"><span class="meta">14 / 500</span><div class="ad-label">Label · 14px / 500</div></div>
  <div class="row"><span class="meta">12 / 500</span><div class="ad-eyebrow">Eyebrow · 12 / 500 · uppercase</div></div>
  <div class="row"><span class="meta">12 / 400</span><div class="ad-caption">Caption · metadata · 12px</div></div>
</body></html>
