<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg); display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); width: 70px; flex-shrink: 0; }
</style>
</head>
<body>
  <div class="row"><span class="lbl">primary</span>
    <button class="ad-btn ad-btn-primary">Start bake</button>
    <button class="ad-btn ad-btn-primary ad-btn-sm">Save</button>
    <button class="ad-btn ad-btn-primary ad-btn-lg">Add recipe</button>
  </div>
  <div class="row"><span class="lbl">accent</span>
    <button class="ad-btn ad-btn-accent">Continue</button>
    <button class="ad-btn ad-btn-accent ad-btn-sm">Confirm</button>
    <button class="ad-btn ad-btn-accent ad-btn-lg">Sign in</button>
  </div>
  <div class="row"><span class="lbl">ghost</span>
    <button class="ad-btn ad-btn-ghost">Cancel</button>
    <button class="ad-btn ad-btn-ghost ad-btn-sm">Edit</button>
  </div>
  <div class="row"><span class="lbl">quiet</span>
    <button class="ad-btn ad-btn-quiet">Skip</button>
    <button class="ad-btn ad-btn-quiet ad-btn-sm">Dismiss</button>
  </div>
</body></html>
