<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing · 4px scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px 22px; background: var(--bg); }
  .row { display: flex; align-items: center; gap: 14px; padding: 5px 0; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); width: 90px; flex-shrink: 0; }
  .bar { background: var(--amber-400); height: 14px; border-radius: 3px; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); margin-left: 6px; }
</style>
</head>
<body>
  <div class="row"><span class="name">--space-1</span><div class="bar" style="width:4px"></div><span class="px">4px</span></div>
  <div class="row"><span class="name">--space-2</span><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
  <div class="row"><span class="name">--space-3</span><div class="bar" style="width:12px"></div><span class="px">12px</span></div>
  <div class="row"><span class="name">--space-4</span><div class="bar" style="width:16px"></div><span class="px">16px</span></div>
  <div class="row"><span class="name">--space-5</span><div class="bar" style="width:20px"></div><span class="px">20px</span></div>
  <div class="row"><span class="name">--space-6</span><div class="bar" style="width:24px"></div><span class="px">24px</span></div>
  <div class="row"><span class="name">--space-8</span><div class="bar" style="width:32px"></div><span class="px">32px</span></div>
  <div class="row"><span class="name">--space-12</span><div class="bar" style="width:48px"></div><span class="px">48px</span></div>
  <div class="row"><span class="name">--space-16</span><div class="bar" style="width:64px"></div><span class="px">64px</span></div>
</body></html>
