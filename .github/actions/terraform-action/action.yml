name: Terraform Action
description: >
  Generic Terraform composite action: plan → apply (if changes detected).
  Requires terraform-setup to have run first in the same job.

inputs:
  working_dir:
    description: Path to the Terraform root module
    required: true
  local_backend:
    description: >
      Use local backend (true for setup roots).
      When true, skips workspace selection.
    required: false
    default: "false"
  extra_tf_vars:
    description: Additional -var flags as a single string — skipped when empty
    required: false
    default: ""
  workspace:
    description: >
      Terraform workspace name to select. Defaults to TF_VAR_environment
      (set by terraform-setup). Use this to pass a branch slug for preview deployments.
    required: false
    default: ""

runs:
  using: composite
  steps:
    # Workspaces isolate dev and prod state within the same backend.
    # Skipped for setup roots which use a local backend.
    - name: Select Terraform workspace
      if: inputs.local_backend == 'false'
      shell: bash
      working-directory: ${{ inputs.working_dir }}
      run: |
        terraform workspace select -or-create ${{ inputs.workspace || env.TF_VAR_environment }}

    - name: Update Terraform State
      if: inputs.local_backend == 'false'
      shell: bash
      working-directory: ${{ inputs.working_dir }}
      run: echo "Update Terraform state if needed"

    # -detailed-exitcode:
    #   0 → no changes  → apply is skipped
    #   1 → error
    #   2 → changes pending → apply runs
    - name: Terraform plan
      id: plan
      shell: bash
      working-directory: ${{ inputs.working_dir }}
      run: |
        set +e
        terraform plan \
          -detailed-exitcode \
          -out=tf.tfplan \
          ${{ inputs.extra_tf_vars }}
        TF_EXIT=$?
        echo "exitcode=$TF_EXIT" >> "$GITHUB_OUTPUT"
        echo "Terraform plan exit code: $TF_EXIT"
        if [ $TF_EXIT -eq 1 ]; then exit 1; fi

    - name: Terraform apply
      if: steps.plan.outputs.exitcode == '2'
      shell: bash
      working-directory: ${{ inputs.working_dir }}
      run: |
        set -e
        terraform apply -auto-approve tf.tfplan
