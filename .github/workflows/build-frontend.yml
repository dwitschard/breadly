# build-frontend.yml
#
# CI pipeline for the Breadly frontend.
# Lints, tests, and produces a production build artifact.
# On main, also creates a GitHub Release and triggers a dev deployment.
#
# Jobs
#   build    Lint → test → build → upload dist artifact
#   release  (main only) Create GitHub Release with dist.zip asset
#   deploy   (main only) Call deploy.yml to deploy to dev
#
# Triggers
#   push              Runs on main when frontend source files change.
#   workflow_call     Reusable entry point (used by preview-deploy).
#   workflow_dispatch Manual trigger for re-running CI on demand.

name: Build Frontend

on:
  push:
    branches:
      - main
    paths:
      - "breadly-frontend/**"
      - "infrastructure/aws/frontend/**"
      - "infrastructure/aws/cdn/**"
      - "infrastructure/aws/deploy/**"
      - ".github/workflows/build-frontend.yml"
      - ".github/workflows/deploy.yml"
      - ".github/actions/**"

  workflow_call:
    inputs:
      base_href:
        description: "Base href for the Angular build (e.g. /preview/my-branch/). Defaults to /."
        required: false
        type: string
        default: "/"

  workflow_dispatch:

concurrency:
  group: build-frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.sha.outputs.short }}
    defaults:
      run:
        working-directory: breadly-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: breadly-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build -- --base-href "${{ inputs.base_href || '/' }}"

      - name: Write version.json
        run: |
          cat > dist/breadly-frontend/browser/version.json <<EOF
          {"version":"${{ steps.sha.outputs.short }}","releaseUrl":"https://github.com/${{ github.repository }}/releases/tag/frontend-${{ steps.sha.outputs.short }}"}
          EOF

      - name: Upload dist artifact
        uses: actions/upload-artifact@v6
        with:
          name: frontend-dist
          path: breadly-frontend/dist/breadly-frontend/browser/
          retention-days: 1

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: dist/

      - name: Zip dist
        working-directory: dist/
        run: zip -r ../dist.zip .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create frontend-${{ needs.build.outputs.short_sha }} dist.zip \
            --title "frontend-${{ needs.build.outputs.short_sha }}" \
            --generate-notes

  deploy:
    name: Deploy Dev
    needs: [ build, release ]
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/deploy.yml
    with:
      release_tag: frontend-${{ needs.build.outputs.short_sha }}
      environment: dev
    secrets: inherit
