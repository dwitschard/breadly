# build-frontend.yml
#
# CI pipeline for the Breadly frontend.
# Lints, tests, and produces a production build artifact.
# On main, also creates a GitHub Release with the dist zip attached.
#
# Jobs
#   build    Lint → test → build → upload dist artifact
#   release  (main only) Create GitHub Release with dist.zip asset
#
# Triggers
#   push              Runs when frontend source files change.
#   workflow_dispatch Manual trigger for re-running CI on demand.

name: Build Frontend

on:
  push:
    paths:
      - "breadly-frontend/**"

  workflow_dispatch:

concurrency:
  group: build-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: breadly-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: breadly-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: breadly-frontend/dist/breadly-frontend/browser/
          retention-days: 1

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Zip dist
        run: zip -r dist.zip dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create frontend-${{ github.sha }} dist.zip \
            --title "frontend-${{ github.sha }}" \
            --generate-notes
