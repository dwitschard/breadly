# main.yml
#
# Unified pipeline for the main branch.
# Builds, validates (E2E), releases, and deploys to the dev environment.
#
# Dev is only deployed when ALL checks pass: backend CI (lint, test, build),
# frontend CI (lint, test, build), preview deployment, and E2E tests.
#
# Jobs:
#   build-backend           Reuses _ci-backend.yml (lint -> test -> build -> artifact).
#   build-frontend-preview  Reuses _ci-frontend.yml with e2e-main base-href.
#   build-storybook         Reuses _ci-storybook.yml (parallel, env-agnostic).
#   deploy-preview          Reuses _deploy-preview.yml with slug "e2e-main".
#   e2e                     Reuses _run-e2e.yml (Playwright E2E tests against the temporary preview).
#   release-backend         Creates GitHub Release with backend.zip (parallel with E2E).
#   release-frontend        Creates GitHub Release with dist.zip (parallel with E2E).
#   release-storybook       Creates GitHub Release with storybook.zip (parallel with E2E).
#   deploy-dev              Calls _deploy.yml to deploy to dev (after releases).
#   teardown                Destroys the temporary stack via teardown-preview-stack action (immediately after E2E).
#
# Timing: teardown runs immediately after E2E completes, parallel with backend releases and dev deploy
# to minimize preview environment cost. deploy-backend and deploy-frontend are updated to not depend on
# the temporary preview and instead depend only on their respective backend and build artifacts.
#
# Required GitHub environment: preview, dev
#   Secrets: AWS_OIDC_ROLE_ARN, AWS_ACCOUNT_ID, MONGODB_URI,
#            PREVIEW_DEMO_PASSWORD, PREVIEW_ADMIN_PASSWORD
#   Variables: AWS_REGION

name: Main

on:
  push:
    branches:
      - main

concurrency:
  group: main
  cancel-in-progress: true

env:
  PROJECT_NAME: breadly

jobs:
  # ---------------------------------------------------------------------------
  # Build backend (reuses CI workflow)
  # ---------------------------------------------------------------------------
  build-backend:
    name: CI Backend
    uses: ./.github/workflows/_ci-backend.yml
    permissions:
      contents: read
      id-token: write
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Build frontend for preview (reuses CI workflow with e2e-main base-href)
  # ---------------------------------------------------------------------------
  build-frontend-preview:
    name: CI Frontend (Preview)
    uses: ./.github/workflows/_ci-frontend.yml
    permissions:
      contents: read
      id-token: write
    with:
      base_href: /preview/e2e-main/
      artifact_name: frontend-dist-preview
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Build Storybook (reuses CI workflow — parallel, env-agnostic)
  # ---------------------------------------------------------------------------
  build-storybook:
    name: CI Storybook
    uses: ./.github/workflows/_ci-storybook.yml
    permissions:
      contents: read
      id-token: write
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Deploy temporary preview environment (reusable workflow)
  # ---------------------------------------------------------------------------
  deploy-preview:
    name: Deploy Temporary Preview
    needs: [build-backend, build-frontend-preview]
    uses: ./.github/workflows/_deploy-preview.yml
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    with:
      slug: e2e-main
      post-pr-comment: false
      frontend_artifact_name: frontend-dist-preview
    secrets: inherit

  # ---------------------------------------------------------------------------
  # End-to-End Tests (Playwright — reusable workflow)
  # ---------------------------------------------------------------------------
  e2e:
    name: Playwright E2E
    needs: [deploy-preview]
    uses: ./.github/workflows/_run-e2e.yml
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    with:
      slug: e2e-main
      preview_url: ${{ needs.deploy-preview.outputs.preview_url }}
      cognito_client_id: ${{ needs.deploy-preview.outputs.cognito_client_id }}
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Build frontend for dev (after E2E passes — different base-href)
  # ---------------------------------------------------------------------------
  build-frontend-dev:
    name: CI Frontend (Dev)
    needs: [e2e]
    uses: ./.github/workflows/_ci-frontend.yml
    permissions:
      contents: read
      id-token: write
    secrets: inherit
    # base_href defaults to "/", artifact_name defaults to "frontend-dist"

  # ---------------------------------------------------------------------------
  # Create releases (only after E2E passes)
  # ---------------------------------------------------------------------------
  release-backend:
    name: Release Backend
    needs: [build-backend, e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: backend-dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create backend-${{ needs.build-backend.outputs.short_sha }} backend.zip \
            --title "backend-${{ needs.build-backend.outputs.short_sha }}" \
            --generate-notes

  release-frontend:
    name: Release Frontend
    needs: [build-frontend-dev]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: dist/

      - name: Package dist as zip
        working-directory: dist/
        run: zip -r ../dist.zip .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create frontend-${{ needs.build-frontend-dev.outputs.short_sha }} dist.zip \
            --title "frontend-${{ needs.build-frontend-dev.outputs.short_sha }}" \
            --generate-notes

  release-storybook:
    name: Release Storybook
    needs: [build-storybook, e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download storybook artifact
        uses: actions/download-artifact@v8
        with:
          name: storybook-dist
          path: storybook-dist/

      - name: Package storybook as zip
        run: zip -r storybook.zip storybook-dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create storybook-${{ needs.build-storybook.outputs.short_sha }} storybook.zip \
            --title "storybook-${{ needs.build-storybook.outputs.short_sha }}" \
            --generate-notes

  # ---------------------------------------------------------------------------
  # Deploy to dev (only after all releases succeed)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: [build-backend, build-storybook, release-backend, release-frontend, release-storybook]
    uses: ./.github/workflows/_deploy.yml
    permissions:
      id-token: write
      contents: read
    with:
      release_tag: backend-${{ needs.build-backend.outputs.short_sha }}
      storybook_release_tag: storybook-${{ needs.build-storybook.outputs.short_sha }}
      environment: dev
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Teardown temporary preview environment (always runs)
  # ---------------------------------------------------------------------------
  teardown:
    name: Teardown Temporary Preview
    needs: [e2e]
    if: always()
    runs-on: ubuntu-latest
    environment: preview
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set MongoDB URI
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          echo "TF_VAR_mongodb_uri=${MONGODB_URI:-placeholder}" >> "$GITHUB_ENV"

      - name: Teardown preview stack
        uses: ./.github/actions/teardown-preview-stack
        with:
          slug: e2e-main
          aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ${{ vars.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}
