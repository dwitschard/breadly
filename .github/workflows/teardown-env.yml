# teardown-env.yml
#
# Manual workflow to destroy all resources for a chosen environment.
#
# For dev/prod: destroys the merged deploy root module.
# For preview: destroys all per-branch preview stacks, then the shared
# preview gateway (API Gateway + S3 bucket + CloudFront).
#
# Jobs:
#   teardown-preview-branches    Destroys all preview workspaces (preview only).
#   teardown-deploy              Destroys the application stack (dev/prod only).
#   teardown-preview-gateway     Destroys the shared preview gateway (preview only).
#
# Triggers
#   workflow_dispatch  Manual trigger only.
#
# Required secrets/variables — see .github/workflows/README.md.
#   Secrets:   AWS_OIDC_ROLE_ARN   AWS_ACCOUNT_ID
#   Variables: AWS_REGION

name: Teardown Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod
          - preview

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  TARGET_ENV: ${{ inputs.environment }}
  PROJECT_NAME: breadly

jobs:
  # ---------------------------------------------------------------------------
  # Teardown all per-branch preview workspaces (preview env only)
  # ---------------------------------------------------------------------------
  teardown-preview-branches:
    name: Destroy All Preview Stacks
    if: inputs.environment == 'preview'
    runs-on: ubuntu-latest
    environment: preview
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Terraform (branch stack)
        uses: ./.github/actions/terraform-setup
        with:
          working_dir: infrastructure/aws/preview/deploy
          environment: preview
          session_name: github-teardown-preview-branches
          aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ${{ vars.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}

      - name: Set Terraform variables (destroy placeholders)
        run: |
          echo "TF_VAR_dist_zip_path=/dev/null" >> "$GITHUB_ENV"
          echo "TF_VAR_mongodb_uri=placeholder" >> "$GITHUB_ENV"
          echo "TF_VAR_cloudfront_url=https://placeholder.cloudfront.net" >> "$GITHUB_ENV"

      - name: Destroy all preview workspaces (loop)
        working-directory: infrastructure/aws/preview/deploy
        run: |
          WORKSPACES=$(terraform workspace list | grep -E '^\s+preview-' | sed 's/^[[:space:]]*//' || true)
          for WS in $WORKSPACES; do
            SLUG="${WS#preview-}"
            echo "Destroying workspace: $WS (slug: $SLUG)"
            terraform workspace select "$WS"
            TF_VAR_branch_slug="$SLUG" terraform destroy -auto-approve || true
            terraform workspace select default
            terraform workspace delete "$WS" || true
          done

  # ---------------------------------------------------------------------------
  # Teardown Deploy — merged root module (dev/prod only)
  # ---------------------------------------------------------------------------
  teardown-deploy:
    name: Destroy Application (${{ inputs.environment }})
    if: inputs.environment != 'preview'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Terraform (deploy)
        uses: ./.github/actions/terraform-setup
        with:
          working_dir: infrastructure/aws/deploy
          environment: ${{ env.TARGET_ENV }}
          session_name: github-teardown-deploy-${{ env.TARGET_ENV }}
          aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ${{ vars.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}

      - name: Set Terraform variables (destroy placeholders)
        run: |
          echo "TF_VAR_mongodb_uri=placeholder" >> "$GITHUB_ENV"
          echo "TF_VAR_dist_zip_path=/dev/null" >> "$GITHUB_ENV"
          mkdir -p /tmp/empty-dist
          echo "TF_VAR_frontend_dist_path=/tmp/empty-dist" >> "$GITHUB_ENV"

      - name: Terraform destroy (application)
        working-directory: infrastructure/aws/deploy
        shell: bash
        run: |
          terraform workspace select ${{ env.TARGET_ENV }}
          terraform destroy -auto-approve

  # ---------------------------------------------------------------------------
  # Teardown Preview Gateway (preview only, after preview branches)
  # ---------------------------------------------------------------------------
  teardown-preview-gateway:
    name: Destroy Preview Gateway
    if: inputs.environment == 'preview'
    needs: [teardown-preview-branches]
    runs-on: ubuntu-latest
    environment: preview
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Terraform (shared gateway)
        uses: ./.github/actions/terraform-setup
        with:
          working_dir: infrastructure/aws/preview/gateway
          environment: preview
          session_name: github-teardown-preview-gateway
          aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ${{ vars.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}

      - name: Terraform destroy (shared gateway)
        working-directory: infrastructure/aws/preview/gateway
        shell: bash
        run: |
          terraform workspace select preview
          terraform destroy -auto-approve
