# _deploy.yml
#
# Unified deployment pipeline for the Breadly application (dev/prod).
# Deploys the Angular SPA (S3), Express API (Lambda), Cognito, API Gateway,
# CDN (CloudFront), and Storybook design system via a single Terraform root module.
#
# Jobs
#   deploy    Downloads all release assets and deploys via Terraform.
#
# Triggers
#   workflow_call     Called by main.yml after E2E validation passes.
#   workflow_dispatch Manually deploy a specific environment.
#
# Prerequisites
#   The Terraform state backend (S3 bucket + DynamoDB table) must already exist.
#   Run manage-terraform.yml once per environment before the first deploy.
#
# Artifacts
#   All three release assets (backend.zip, dist.zip, storybook.zip) are always
#   downloaded. If a specific release tag is provided it is used; otherwise the
#   latest release of that type is fetched. This mirrors the existing pattern for
#   backend and frontend and lets Terraform manage file uploads consistently.
#
# Required secrets/variables — see .github/workflows/README.md.
#   Secrets:   AWS_OIDC_ROLE_ARN   AWS_ACCOUNT_ID   MONGODB_URI
#   Variables: AWS_REGION

name: Deploy (Dev / Prod)

on:
  workflow_call:
    inputs:
      release_tag:
        description: "Release tag being deployed (e.g. backend-a1b2c3d or frontend-a1b2c3d)"
        required: true
        type: string
      storybook_release_tag:
        description: "Storybook release tag to deploy (e.g. storybook-a1b2c3d). Leave empty for latest."
        required: false
        type: string
        default: ""
      environment:
        required: true
        type: string

  workflow_dispatch:
    inputs:
      backend_release_tag:
        description: "Backend release tag (leave empty for latest)"
        required: false
        type: string
        default: ""
      frontend_release_tag:
        description: "Frontend release tag (leave empty for latest)"
        required: false
        type: string
        default: ""
      storybook_release_tag:
        description: "Storybook release tag (leave empty for latest)"
        required: false
        type: string
        default: ""
      environment:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

concurrency:
  group: deploy-${{ inputs.environment || github.event.inputs.environment }}
  cancel-in-progress: false

env:
  TARGET_ENV: ${{ inputs.environment || github.event.inputs.environment }}
  PROJECT_NAME: breadly

jobs:
  deploy:
    name: ${{ inputs.environment || github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || github.event.inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Download the latest backend release asset. If the caller provided a
      # backend-* release_tag, use that; otherwise fetch the latest.
      - name: Download backend artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=""
          # workflow_call: release_tag is set
          if [[ -n "${{ inputs.release_tag }}" && "${{ inputs.release_tag }}" == backend-* ]]; then
            TAG="${{ inputs.release_tag }}"
          # workflow_dispatch: explicit backend tag
          elif [[ -n "${{ github.event.inputs.backend_release_tag }}" ]]; then
            TAG="${{ github.event.inputs.backend_release_tag }}"
          fi

          if [[ -n "$TAG" ]]; then
            echo "Downloading backend.zip from release $TAG"
            gh release download "$TAG" --pattern backend.zip
          else
            echo "Downloading backend.zip from latest backend release"
            gh release download --pattern backend.zip \
              $(gh release list --limit 50 --json tagName --jq '[.[] | select(.tagName | startswith("backend-"))][0].tagName')
          fi

      # Download the latest frontend release asset. If the caller provided a
      # frontend-* release_tag, use that; otherwise fetch the latest.
      - name: Download frontend artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=""
          # workflow_call: release_tag is set
          if [[ -n "${{ inputs.release_tag }}" && "${{ inputs.release_tag }}" == frontend-* ]]; then
            TAG="${{ inputs.release_tag }}"
          # workflow_dispatch: explicit frontend tag
          elif [[ -n "${{ github.event.inputs.frontend_release_tag }}" ]]; then
            TAG="${{ github.event.inputs.frontend_release_tag }}"
          fi

          if [[ -n "$TAG" ]]; then
            echo "Downloading dist.zip from release $TAG"
            gh release download "$TAG" --pattern dist.zip
          else
            echo "Downloading dist.zip from latest frontend release"
            gh release download --pattern dist.zip \
              $(gh release list --limit 50 --json tagName --jq '[.[] | select(.tagName | startswith("frontend-"))][0].tagName')
          fi

      # Download the latest storybook release asset. If the caller provided a
      # storybook-* tag, use that; otherwise fetch the latest.
      - name: Download storybook artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.storybook_release_tag || github.event.inputs.storybook_release_tag }}"

          if [[ -n "$TAG" ]]; then
            echo "Downloading storybook.zip from release $TAG"
            gh release download "$TAG" --pattern storybook.zip
          else
            echo "Downloading storybook.zip from latest storybook release"
            gh release download --pattern storybook.zip \
              $(gh release list --limit 50 --json tagName --jq '[.[] | select(.tagName | startswith("storybook-"))][0].tagName')
          fi

      - name: Unpack frontend artifact
        run: |
          mkdir -p breadly-frontend/dist/browser/
          unzip dist.zip -d breadly-frontend/dist/browser/

      - name: Unpack storybook artifact
        run: |
          mkdir -p storybook-dist/
          unzip storybook.zip -d storybook-dist-zip/
          mv storybook-dist-zip/storybook-dist/* storybook-dist/ 2>/dev/null || mv storybook-dist-zip/* storybook-dist/

      - name: Setup Terraform (deploy)
        uses: ./.github/actions/terraform-setup
        with:
          working_dir: infrastructure/aws/deploy
          environment: ${{ env.TARGET_ENV }}
          session_name: github-deploy-${{ env.TARGET_ENV }}
          aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ${{ vars.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}

      - name: Export Terraform secrets
        run: |
          echo "TF_VAR_mongodb_uri=${{ secrets.MONGODB_URI }}" >> "$GITHUB_ENV"
          echo "TF_VAR_admin_notification_email=${{ vars.ADMIN_NOTIFICATION_EMAIL }}" >> "$GITHUB_ENV"

      - name: Terraform apply
        uses: ./.github/actions/terraform-action
        with:
          working_dir: infrastructure/aws/deploy
          extra_tf_vars: >-
            -var="dist_zip_path=${{ github.workspace }}/backend.zip"
            -var="frontend_dist_path=${{ github.workspace }}/breadly-frontend/dist/browser"
            -var="storybook_dist_path=${{ github.workspace }}/storybook-dist"

      - name: Invalidate CloudFront cache
        working-directory: infrastructure/aws/deploy
        run: |
          DIST_ID=$(terraform output -raw cloudfront_distribution_id)
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*"

      - name: Invalidate storybook CloudFront cache
        working-directory: infrastructure/aws/deploy
        run: |
          DIST_ID=$(terraform output -raw storybook_cloudfront_distribution_id)
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*"

      - name: Print deployment URLs
        working-directory: infrastructure/aws/deploy
        run: |
          echo "App URL:        $(terraform output -raw cloudfront_url)"
          echo "Storybook URL:  $(terraform output -raw storybook_url)"
          echo "API Gateway:    $(terraform output -raw api_gateway_endpoint)"
