# e2e-main.yml
#
# Runs E2E tests on the main branch after every push.
# Deploys a temporary preview environment with a fixed slug ("e2e-main"),
# runs the Playwright E2E suite against it, and tears it down afterward.
#
# This workflow validates that the main branch passes full user journey
# tests before code reaches the dev environment. E2E failure does not
# block the dev deploy directly (build workflows handle that), but it
# provides a required status check for PR merges via branch protection.
#
# Jobs:
#   build-backend    Reuses ci-backend.yml (lint -> test -> build -> artifact).
#   build-frontend   Reuses ci-frontend.yml with e2e-main base-href.
#   deploy-preview   Reuses _deploy-preview.yml with slug "e2e-main".
#   e2e              Reuses _run-e2e.yml (Playwright E2E tests against the temporary preview).
#   teardown         Destroys the temporary stack via teardown-preview-stack action (always runs).
#
# Required GitHub environment: preview
#   Secrets: AWS_OIDC_ROLE_ARN, AWS_ACCOUNT_ID, MONGODB_URI,
#            PREVIEW_DEMO_PASSWORD, PREVIEW_ADMIN_PASSWORD
#   Variables: AWS_REGION

name: E2E (Main Branch)

on:
  push:
    branches:
      - main

concurrency:
  group: e2e-main
  cancel-in-progress: true

env:
  PROJECT_NAME: breadly

jobs:
  # ---------------------------------------------------------------------------
  # Build backend (reuses CI workflow)
  # ---------------------------------------------------------------------------
  build-backend:
    name: CI Backend
    uses: ./.github/workflows/ci-backend.yml
    permissions:
      contents: write
      id-token: write
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Build frontend (reuses CI workflow with e2e-main base-href)
  # ---------------------------------------------------------------------------
  build-frontend:
    name: CI Frontend
    uses: ./.github/workflows/ci-frontend.yml
    permissions:
      contents: write
      id-token: write
    with:
      base_href: /preview/e2e-main/
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Deploy temporary preview environment (reusable workflow)
  # ---------------------------------------------------------------------------
  deploy-preview:
    name: Deploy Temporary Preview
    needs: [build-backend, build-frontend]
    uses: ./.github/workflows/_deploy-preview.yml
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    with:
      slug: e2e-main
      post-pr-comment: false
    secrets: inherit

  # ---------------------------------------------------------------------------
  # End-to-End Tests (Playwright — reusable workflow)
  # ---------------------------------------------------------------------------
  e2e:
    name: Playwright E2E
    needs: [deploy-preview]
    uses: ./.github/workflows/_run-e2e.yml
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    with:
      slug: e2e-main
      preview_url: ${{ needs.deploy-preview.outputs.preview_url }}
      cognito_client_id: ${{ needs.deploy-preview.outputs.cognito_client_id }}
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Teardown temporary preview environment
  # ---------------------------------------------------------------------------
  teardown:
    name: Teardown Temporary Preview
    needs: [deploy-preview, e2e]
    if: always()
    runs-on: ubuntu-latest
    environment: preview
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set MongoDB URI
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          echo "TF_VAR_mongodb_uri=${MONGODB_URI:-placeholder}" >> "$GITHUB_ENV"

      - name: Teardown preview stack
        uses: ./.github/actions/teardown-preview-stack
        with:
          slug: e2e-main
          aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ${{ vars.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}
