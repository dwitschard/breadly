# setup-deployment-infrastructure.yml
#
# One-time setup and teardown of the Terraform state backend for the frontend.
# Creates (or destroys) the S3 state bucket and DynamoDB lock table that all
# other frontend Terraform roots depend on.
#
# Jobs
#   setup     Runs terraform plan/apply against the bootstrap root.
#   teardown  Imports and destroys all bootstrap resources.
#
# Triggers
#   workflow_dispatch  Manual trigger only — this workflow is run once per
#                      environment, not as part of the regular deploy pipeline.
#
# Required secrets/variables — see .github/workflows/README.md.
#   Secrets:   AWS_OIDC_ROLE_ARN   AWS_ACCOUNT_ID
#   Variables: AWS_REGION

name: Setup Deployment Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod
      teardown:
        description: "Destroy the bootstrap stack (S3 bucket + DynamoDB table)"
        required: false
        default: false
        type: boolean

jobs:
  setup:
    name: Setup (${{ inputs.environment }})
    if: inputs.teardown == false
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Frontend Deployment State
        uses: ./.github/actions/terraform-action
        with:
          working_dir: infrastructure/aws/frontend/bootstrap
          environment: ${{ inputs.environment }}
          session_name: github-setup-frontend-${{ inputs.environment }}
          aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ${{ vars.AWS_REGION }}
          local_backend: "true"

  teardown:
    name: Teardown State Infrastructure (${{ inputs.environment }})
    if: inputs.teardown == true
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    env:
      WORKING_DIR: infrastructure/aws/frontend/bootstrap
    steps:
      - name: Export credentials to environment
        shell: bash
        run: |
          echo "TF_ACTION_ROLE_ARN=${{ secrets.AWS_OIDC_ROLE_ARN }}"  >> "$GITHUB_ENV"
          echo "TF_ACTION_AWS_REGION=${{ vars.AWS_REGION }}"       >> "$GITHUB_ENV"
          echo "TF_ACTION_SESSION_NAME=github-setup-frontend-${{ inputs.environment }}"   >> "$GITHUB_ENV"
          echo "TF_VAR_environment=${{ inputs.environment }}"        >> "$GITHUB_ENV"
          echo "TF_VAR_aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}"  >> "$GITHUB_ENV"        

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: github-teardown-frontend-state-${{ inputs.environment }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ env.WORKING_DIR }}
        shell: bash
        run: terraform init

      - name: Import State Resources
        working-directory: ${{ env.WORKING_DIR }}
        shell: bash
        run: |
          terraform import aws_s3_bucket.tfstate breadly-${{ inputs.environment }}-tfstate
          terraform import aws_dynamodb_table.tfstate_lock breadly-${{ inputs.environment }}-tfstate-lock

      - name: Terraform destroy
        working-directory: ${{ env.WORKING_DIR }}
        shell: bash
        run: terraform destroy -auto-approve
