# _ci-frontend.yml
#
# Reusable CI pipeline for the Breadly frontend.
# Lints, tests, and produces a production build artifact (frontend-dist).
#
# This is a private/reusable workflow — it does not trigger on push.
# It is called by main.yml (main branch pipeline) and
# feature-branch.yml (preview environments).
#
# Jobs
#   build    Lint → test → build → upload dist artifact
#
# Inputs
#   base_href       Base href for the Angular build (default: /).
#   artifact_name   Name for the uploaded artifact (default: frontend-dist).
#
# Outputs
#   short_sha   Short commit SHA (used for release tagging by the caller).

name: CI Frontend

on:
  workflow_call:
    inputs:
      base_href:
        description: "Base href for the Angular build (e.g. /preview/my-branch/). Defaults to /."
        required: false
        type: string
        default: "/"
      artifact_name:
        description: "Name for the uploaded build artifact. Defaults to frontend-dist."
        required: false
        type: string
        default: "frontend-dist"
    outputs:
      short_sha:
        description: "Short SHA of the commit (7 chars)"
        value: ${{ jobs.build.outputs.short_sha }}

  workflow_dispatch:

concurrency:
  group: build-frontend-${{ inputs.artifact_name || 'frontend-dist' }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.sha.outputs.short }}
    defaults:
      run:
        working-directory: breadly-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: breadly-frontend/package-lock.json

      - name: Install API spec dependencies (breadly-api)
        run: npm ci
        working-directory: breadly-api

      - name: Install dependencies (breadly-frontend)
        run: npm ci

      - name: Generate API types
        run: npm run generate-api

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build -- --base-href "${{ inputs.base_href || '/' }}"

      - name: Write version.json
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            URL="https://github.com/${{ github.repository }}/releases/tag/frontend-${{ steps.sha.outputs.short }}"
          else
            URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          fi
          cat > dist/breadly-frontend/browser/version.json <<EOF
          {"version":"${{ steps.sha.outputs.short }}","releaseUrl":"$URL"}
          EOF

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.artifact_name || 'frontend-dist' }}
          path: breadly-frontend/dist/breadly-frontend/browser/
          retention-days: 1
