# _ci-backend.yml
#
# Reusable CI pipeline for the Breadly backend.
# Lints, tests, and produces a production build artifact (backend.zip).
#
# This is a private/reusable workflow — it does not trigger on push.
# It is called by main.yml (main branch pipeline) and
# e2e-feature-branches.yml (preview environments).
#
# Jobs
#   build    Lint → test → build → upload dist artifact
#
# Outputs
#   short_sha   Short commit SHA (used for release tagging by the caller).

name: CI Backend

on:
  workflow_call:
    outputs:
      short_sha:
        description: "Short SHA of the commit (7 chars)"
        value: ${{ jobs.build.outputs.short_sha }}

  workflow_dispatch:

concurrency:
  group: build-backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.sha.outputs.short }}
    defaults:
      run:
        working-directory: breadly-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: breadly-backend/package-lock.json

      - name: Install API spec dependencies (breadly-api)
        run: npm ci
        working-directory: breadly-api

      - name: Install dependencies (breadly-backend)
        run: npm ci

      - name: Generate API types
        run: npm run generate-api

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Write version.json
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            URL="https://github.com/${{ github.repository }}/releases/tag/backend-${{ steps.sha.outputs.short }}"
          else
            URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          fi
          cat > dist/version.json <<EOF
          {"version":"${{ steps.sha.outputs.short }}","releaseUrl":"$URL"}
          EOF

      - name: Reinstall production dependencies only
        run: npm ci --omit=dev

      - name: Package deployment artifact
        run: zip -r ../backend.zip dist/ node_modules/ package.json run.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: backend-dist
          path: backend.zip
          retention-days: 1
