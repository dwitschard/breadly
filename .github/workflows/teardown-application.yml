
name: Teardown Application

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod
          - preview

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  TARGET_ENV: ${{ inputs.environment }}
  PROJECT_NAME: breadly

jobs:
  # ---------------------------------------------------------------------------
  # Teardown all per-branch preview workspaces (preview env only)
  # ---------------------------------------------------------------------------
  teardown-preview-branches:
    name: Teardown Preview Branches
    if: inputs.environment == 'preview'
    runs-on: ubuntu-latest
    environment: preview
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: github-teardown-preview-branches

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.6"
          terraform_wrapper: false

      - name: Terraform init (preview module)
        working-directory: infrastructure/aws/preview/deploy
        run: |
          terraform init \
            -backend-config="bucket=${{ env.PROJECT_NAME }}-preview-tfstate" \
            -backend-config="dynamodb_table=${{ env.PROJECT_NAME }}-preview-tfstate-lock" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      - name: Set Terraform variables
        run: |
          echo "TF_VAR_aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" >> "$GITHUB_ENV"
          echo "TF_VAR_aws_region=${{ vars.AWS_REGION }}" >> "$GITHUB_ENV"
          echo "TF_VAR_project_name=${{ env.PROJECT_NAME }}" >> "$GITHUB_ENV"
          echo "TF_VAR_dist_zip_path=/dev/null" >> "$GITHUB_ENV"
          echo "TF_VAR_mongodb_uri=placeholder" >> "$GITHUB_ENV"
          echo "TF_VAR_cloudfront_url=https://placeholder.cloudfront.net" >> "$GITHUB_ENV"
          mkdir -p /tmp/empty-dist
          echo "TF_VAR_frontend_dist_path=/tmp/empty-dist" >> "$GITHUB_ENV"

      - name: Destroy all preview workspaces
        working-directory: infrastructure/aws/preview/deploy
        run: |
          WORKSPACES=$(terraform workspace list | grep -E '^\s+preview-' | sed 's/^[[:space:]]*//' || true)
          for WS in $WORKSPACES; do
            SLUG="${WS#preview-}"
            echo "Destroying workspace: $WS (slug: $SLUG)"
            terraform workspace select "$WS"
            TF_VAR_branch_slug="$SLUG" terraform destroy -auto-approve || true
            terraform workspace select default
            terraform workspace delete "$WS" || true
          done

  # ---------------------------------------------------------------------------
  # Teardown CDN
  # ---------------------------------------------------------------------------
  teardown-cdn:
    name: Teardown CDN (${{ inputs.environment }})
    needs: [teardown-preview-branches]
    if: always() && (needs.teardown-preview-branches.result == 'success' || needs.teardown-preview-branches.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: ./.github/actions/terraform-setup
        with:
          working_dir: infrastructure/aws/cdn/deploy
          environment: ${{ env.TARGET_ENV }}
          session_name: github-teardown-cdn-${{ env.TARGET_ENV }}
          aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ${{ vars.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}

      - name: Terraform destroy
        working-directory: infrastructure/aws/cdn/deploy
        shell: bash
        run: |
          terraform workspace select ${{ env.TARGET_ENV }}
          terraform destroy -auto-approve \
            ${{ inputs.environment == 'preview' && '-var="preview_only=true" -var="api_gateway_url=https://placeholder"' || '' }}

  # ---------------------------------------------------------------------------
  # Teardown Frontend (dev/prod only)
  # ---------------------------------------------------------------------------
  teardown-frontend:
    name: Teardown Frontend (${{ inputs.environment }})
    if: inputs.environment != 'preview'
    needs: [teardown-cdn]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: ./.github/actions/terraform-setup
        with:
          working_dir: infrastructure/aws/frontend/deploy
          environment: ${{ env.TARGET_ENV }}
          session_name: github-teardown-frontend-${{ env.TARGET_ENV }}
          aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ${{ vars.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}

      - name: Terraform destroy
        working-directory: infrastructure/aws/frontend/deploy
        shell: bash
        run: |
          terraform workspace select ${{ env.TARGET_ENV }}
          terraform destroy -auto-approve

  # ---------------------------------------------------------------------------
  # Teardown Backend (dev/prod only)
  # ---------------------------------------------------------------------------
  teardown-backend:
    name: Teardown Backend (${{ inputs.environment }})
    if: inputs.environment != 'preview'
    needs: [teardown-cdn]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: ./.github/actions/terraform-setup
        with:
          working_dir: infrastructure/aws/backend/deploy
          environment: ${{ env.TARGET_ENV }}
          session_name: github-teardown-backend-${{ env.TARGET_ENV }}
          aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ${{ vars.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}

      - name: Terraform destroy
        working-directory: infrastructure/aws/backend/deploy
        shell: bash
        run: |
          terraform workspace select ${{ env.TARGET_ENV }}
          terraform destroy -auto-approve

  # ---------------------------------------------------------------------------
  # Teardown Preview Gateway (preview only, after CDN)
  # ---------------------------------------------------------------------------
  teardown-preview-gateway:
    name: Teardown Preview Gateway
    if: inputs.environment == 'preview'
    needs: [teardown-cdn]
    runs-on: ubuntu-latest
    environment: preview
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: ./.github/actions/terraform-setup
        with:
          working_dir: infrastructure/aws/preview/gateway
          environment: preview
          session_name: github-teardown-preview-gateway
          aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ${{ vars.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}

      - name: Terraform destroy
        working-directory: infrastructure/aws/preview/gateway
        shell: bash
        run: |
          terraform workspace select preview
          terraform destroy -auto-approve
