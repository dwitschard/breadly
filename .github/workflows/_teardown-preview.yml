# _teardown-preview.yml
#
# Reusable workflow — tears down a single preview branch stack.
#
# Delegates all teardown logic to the teardown-preview-stack composite action.
#
# Triggers:
#   workflow_call   — Called by preview-cleanup.yml (branch deletion) and
#                     e2e-main.yml (temporary preview teardown after E2E tests).
#   workflow_dispatch — Manual trigger from the GitHub Actions UI to tear down
#                       a single preview branch by slug.
#
# Required GitHub environment: preview
#   Secrets: AWS_OIDC_ROLE_ARN, AWS_ACCOUNT_ID
#   Variables: AWS_REGION

name: Teardown Preview Stack

on:
  workflow_call:
    inputs:
      slug:
        description: URL-safe branch slug identifying the preview stack to destroy.
        required: true
        type: string
    secrets:
      MONGODB_URI:
        description: MongoDB connection string. Falls back to a placeholder if not provided.
        required: false

  workflow_dispatch:
    inputs:
      slug:
        description: "URL-safe branch slug to tear down (e.g. feat-my-branch)"
        required: true
        type: string

env:
  PROJECT_NAME: breadly

jobs:
  teardown:
    name: Teardown Preview (${{ inputs.slug }})
    runs-on: ubuntu-latest
    environment: preview
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set MongoDB URI
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          echo "TF_VAR_mongodb_uri=${MONGODB_URI:-placeholder}" >> "$GITHUB_ENV"

      - name: Teardown preview stack
        uses: ./.github/actions/teardown-preview-stack
        with:
          slug: ${{ inputs.slug }}
          aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ${{ vars.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}
