# preview-cleanup.yml
#
# Tears down the preview environment for a deleted branch.
# Triggered automatically when a branch is deleted.
#
# Computes the branch slug, then delegates to _teardown-preview.yml
# for the actual teardown (terraform destroy + S3 cleanup + workspace deletion).
#
# Required GitHub environment: preview
#   Secrets: AWS_OIDC_ROLE_ARN, AWS_ACCOUNT_ID
#   Variables: AWS_REGION

name: Preview Cleanup

concurrency:
  group: preview-cleanup
  cancel-in-progress: false

on:
  delete:
    # Filters are not supported for delete events — we check ref_type in the job.

jobs:
  # ---------------------------------------------------------------------------
  # Compute branch slug
  # ---------------------------------------------------------------------------
  slugify:
    name: Compute Branch Slug
    if: github.event.ref_type == 'branch' && github.event.ref != 'main'
    runs-on: ubuntu-latest
    outputs:
      slug: ${{ steps.slug.outputs.slug }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Compute branch slug
        id: slug
        uses: ./.github/actions/slugify-branch
        with:
          branch: ${{ github.event.ref }}

  # ---------------------------------------------------------------------------
  # Teardown preview stack (reusable workflow)
  # ---------------------------------------------------------------------------
  cleanup:
    name: Cleanup Preview (${{ needs.slugify.outputs.slug }})
    needs: [slugify]
    uses: ./.github/workflows/_teardown-preview.yml
    permissions:
      id-token: write
      contents: read
    with:
      slug: ${{ needs.slugify.outputs.slug }}
    secrets: inherit
