# migrate-cdn-state.yml
#
# ONE-TIME MIGRATION — delete this file after successful migration of all environments.
#
# Moves CloudFront resources from the frontend Terraform state to the new
# cdn/deploy Terraform state without destroying or recreating any AWS resources.
# This enables zero-downtime extraction of the CDN module.
#
# Resources migrated:
#   1. aws_cloudfront_origin_access_control.this
#   2. aws_cloudfront_distribution.this
#   3. aws_s3_bucket_policy.cloudfront_oac
#
# All three live under module.cdn in both the old (frontend) and new (cdn) state.
#
# How it works:
#   1. Read resource IDs from frontend state (before removal)
#   2. Remove the 3 resources from frontend state (terraform state rm)
#   3. Import the 3 resources into CDN state (terraform import)
#   4. Plan + apply CDN to reconcile any import drift
#
# No frontend plan+apply is needed after state rm: the frontend code no longer
# references module.cdn, so removing the state entries is sufficient. Running a
# frontend plan would require a valid frontend_dist_path and would only show
# S3-file noise unrelated to the migration.
#
# Prerequisites:
#   The frontend/deploy module must still contain the module.cdn resources in its
#   state. If they have already been removed (e.g., by a prior run), step 1 will
#   fail safely with a clear error message.
#
# Recovery from partial failure:
#   If Phase 1 (state rm) succeeds but Phase 2 (import) fails, the resources are
#   removed from frontend state but not yet imported into CDN state. The AWS
#   resources still exist but are unmanaged. To recover, re-run the terraform
#   import commands from Phase 2 manually against the CDN state using the IDs
#   printed in the step output log.

name: "Migrate CDN State (one-time)"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  TARGET_ENV: ${{ inputs.environment }}
  PROJECT_NAME: breadly

jobs:
  migrate:
    name: Migrate CDN state (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # -----------------------------------------------------------------------
      # Phase 1: Remove resources from frontend state
      # -----------------------------------------------------------------------

      - name: Setup Terraform (frontend)
        uses: ./.github/actions/terraform-setup
        with:
          working_dir: infrastructure/aws/frontend/deploy
          environment: ${{ env.TARGET_ENV }}
          session_name: github-migrate-cdn-frontend-${{ env.TARGET_ENV }}
          aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ${{ vars.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}

      - name: Select frontend workspace
        working-directory: infrastructure/aws/frontend/deploy
        shell: bash
        run: terraform workspace select ${{ env.TARGET_ENV }}

      - name: Extract resource IDs from frontend state
        id: ids
        working-directory: infrastructure/aws/frontend/deploy
        shell: bash
        run: |
          echo "Reading resource IDs from frontend state..."

          CF_DIST_ID=$(terraform state show 'module.cdn.aws_cloudfront_distribution.this' 2>/dev/null | grep '^\s*id\s' | head -1 | awk '{print $NF}' | tr -d '"') || true
          OAC_ID=$(terraform state show 'module.cdn.aws_cloudfront_origin_access_control.this' 2>/dev/null | grep '^\s*id\s' | head -1 | awk '{print $NF}' | tr -d '"') || true
          BUCKET_ID=$(terraform state show 'module.cdn.aws_s3_bucket_policy.cloudfront_oac' 2>/dev/null | grep '^\s*bucket\s' | head -1 | awk '{print $NF}' | tr -d '"') || true

          if [[ -z "$CF_DIST_ID" || -z "$OAC_ID" || -z "$BUCKET_ID" ]]; then
            echo "::error::Could not find CDN resources in frontend state. They may have already been migrated."
            echo "  CloudFront Distribution ID: ${CF_DIST_ID:-NOT FOUND}"
            echo "  OAC ID: ${OAC_ID:-NOT FOUND}"
            echo "  Bucket ID: ${BUCKET_ID:-NOT FOUND}"
            exit 1
          fi

          echo "cf_dist_id=$CF_DIST_ID" >> "$GITHUB_OUTPUT"
          echo "oac_id=$OAC_ID" >> "$GITHUB_OUTPUT"
          echo "bucket_id=$BUCKET_ID" >> "$GITHUB_OUTPUT"

          echo "CloudFront Distribution ID: $CF_DIST_ID"
          echo "OAC ID: $OAC_ID"
          echo "Bucket ID: $BUCKET_ID"

      - name: Remove CDN resources from frontend state
        working-directory: infrastructure/aws/frontend/deploy
        shell: bash
        run: |
          echo "Removing 3 resources from frontend state..."
          terraform state rm 'module.cdn.aws_cloudfront_origin_access_control.this'
          terraform state rm 'module.cdn.aws_cloudfront_distribution.this'
          terraform state rm 'module.cdn.aws_s3_bucket_policy.cloudfront_oac'
          echo "All 3 resources removed from frontend state."

      # -----------------------------------------------------------------------
      # Phase 2: Import resources into CDN state
      # -----------------------------------------------------------------------

      - name: Setup Terraform (CDN)
        uses: ./.github/actions/terraform-setup
        with:
          working_dir: infrastructure/aws/cdn/deploy
          environment: ${{ env.TARGET_ENV }}
          session_name: github-migrate-cdn-${{ env.TARGET_ENV }}
          aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ${{ vars.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}

      - name: Select CDN workspace
        working-directory: infrastructure/aws/cdn/deploy
        shell: bash
        run: terraform workspace select -or-create ${{ env.TARGET_ENV }}

      - name: Import CDN resources
        working-directory: infrastructure/aws/cdn/deploy
        shell: bash
        env:
          OAC_ID: ${{ steps.ids.outputs.oac_id }}
          CF_DIST_ID: ${{ steps.ids.outputs.cf_dist_id }}
          BUCKET_ID: ${{ steps.ids.outputs.bucket_id }}
        run: |
          echo "Importing 3 resources into CDN state..."
          terraform import 'module.cdn.aws_cloudfront_origin_access_control.this' "$OAC_ID"
          terraform import 'module.cdn.aws_cloudfront_distribution.this' "$CF_DIST_ID"
          terraform import 'module.cdn.aws_s3_bucket_policy.cloudfront_oac' "$BUCKET_ID"
          echo "All 3 resources imported into CDN state."

      - name: Plan and apply CDN (reconcile)
        working-directory: infrastructure/aws/cdn/deploy
        shell: bash
        run: |
          set +e
          terraform plan \
            -detailed-exitcode \
            -out=tf.tfplan
          TF_EXIT=$?

          if [[ $TF_EXIT -eq 1 ]]; then
            echo "::error::CDN plan failed after import."
            exit 1
          elif [[ $TF_EXIT -eq 2 ]]; then
            echo "CDN plan shows drift after import — applying to reconcile."
            terraform apply -auto-approve tf.tfplan
          else
            echo "CDN plan is clean — no drift after import."
          fi

      # -----------------------------------------------------------------------
      # Phase 3: Verify and report
      # -----------------------------------------------------------------------

      - name: Verify CDN state
        working-directory: infrastructure/aws/cdn/deploy
        shell: bash
        env:
          CF_DIST_ID: ${{ steps.ids.outputs.cf_dist_id }}
          OAC_ID: ${{ steps.ids.outputs.oac_id }}
          BUCKET_ID: ${{ steps.ids.outputs.bucket_id }}
        run: |
          echo "=== Migration Summary ==="
          echo "Environment: ${{ env.TARGET_ENV }}"
          echo ""
          echo "CloudFront Distribution ID: $CF_DIST_ID"
          echo "OAC ID: $OAC_ID"
          echo "Bucket ID: $BUCKET_ID"
          echo ""
          echo "CloudFront URL: $(terraform output -raw cloudfront_url)"
          echo "Distribution ID (from state): $(terraform output -raw cloudfront_distribution_id)"
          echo ""
          echo "Migration complete. No AWS resources were destroyed or recreated."
          echo ""
          echo "REMINDER: Delete .github/workflows/migrate-cdn-state.yml after all environments are migrated."
