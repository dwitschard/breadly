# deploy-backend.yml
#
# Deployment pipeline for the Breadly backend.
# Deploys the Express API as an AWS Lambda function via Terraform.
#
# Jobs
#   deploy    Downloads the release asset and deploys via Terraform.
#
# Triggers
#   workflow_call     Called by build-backend.yml on main to auto-deploy to dev.
#   workflow_dispatch Manually deploy a specific release to a target environment.
#
# Prerequisites
#   The Terraform state backend (S3 bucket + DynamoDB table) must already exist.
#   Run setup-deployment-infrastructure.yml once per environment before the first deploy.
#
# Required secrets/variables — see .github/workflows/README.md.
#   Secrets:   AWS_OIDC_ROLE_ARN   AWS_ACCOUNT_ID
#   Variables: AWS_REGION

name: Deploy Backend

on:
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
      environment:
        required: true
        type: string

  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to deploy (e.g. backend-a1b2c3d)"
        required: true
        type: string
      environment:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

env:
  TARGET_ENV: ${{ inputs.environment }}

jobs:
  deploy:
    name: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download ${{ inputs.release_tag }} --pattern backend.zip

      - name: Setup Terraform
        uses: ./.github/actions/terraform-setup
        with:
          working_dir: infrastructure/aws/backend/deploy
          environment: ${{ env.TARGET_ENV }}
          session_name: github-deploy-backend-${{ env.TARGET_ENV }}
          aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ${{ vars.AWS_REGION }}

      - name: Deploy stack
        uses: ./.github/actions/terraform-action
        with:
          working_dir: infrastructure/aws/backend/deploy
          environment: ${{ env.TARGET_ENV }}
          extra_tf_vars: >-
            -var="dist_zip_path=${{ github.workspace }}/backend.zip"

      - name: Print backend URL
        working-directory: infrastructure/aws/backend/deploy
        run: terraform output -raw backend_function_url
