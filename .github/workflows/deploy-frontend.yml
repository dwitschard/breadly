# deploy-frontend.yml
#
# Deployment pipeline for the Breadly frontend.
# Deploys the Angular SPA to S3 via Terraform.
#
# Jobs
#   deploy     Downloads the release asset and deploys via Terraform.
#
# Triggers
#   workflow_call     Called by build-frontend.yml on main to auto-deploy to dev.
#   workflow_dispatch Manually deploy a specific release tag to dev or prod.
#
# Prerequisites
#   The Terraform state backend (S3 bucket + DynamoDB table) must already exist.
#   Run setup-deployment-infra.yml once per environment before the first deploy.
#
# Required secrets/variables — see .github/workflows/README.md.
#   Secrets:   AWS_OIDC_ROLE_ARN   AWS_ACCOUNT_ID
#   Variables: AWS_REGION

name: Deploy Frontend

on:
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
      environment:
        required: false
        default: dev
        type: string

  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to deploy (e.g. frontend-a1b2c3d)"
        required: true
        type: string
      environment:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  TARGET_ENV: ${{ inputs.environment || 'dev' }}
  # Note: vars.* and secrets.* are intentionally not set here — they are not
  # available at workflow-level env when called via workflow_call. They are
  # passed directly at each composite action call site instead.

jobs:
  deploy:
    name: Deploy (${{ inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download ${{ inputs.release_tag }} --pattern dist.zip

      - name: Unzip dist
        run: |
          mkdir -p breadly-frontend/dist/breadly-frontend/browser/
          unzip dist.zip -d breadly-frontend/dist/breadly-frontend/browser/

      - name: Deploy stack
        uses: ./.github/actions/terraform-action
        with:
          working_dir: infrastructure/aws/frontend/infra
          environment: ${{ env.TARGET_ENV }}
          session_name: github-deploy-frontend-${{ env.TARGET_ENV }}
          aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ${{ vars.AWS_REGION }}
          extra_tf_vars: >-
            -var="frontend_dist_path=${{ github.workspace }}/breadly-frontend/dist/breadly-frontend/browser"

      - name: Print website URL
        working-directory: infrastructure/aws/frontend/infra
        run: terraform output -raw frontend_website_url
