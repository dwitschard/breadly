# deploy-frontend.yml
#
# Deployment pipeline for the Breadly frontend.
# Deploys or tears down the Angular SPA on S3 via Terraform.
#
# Jobs
#   deploy    Downloads the release asset and deploys via Terraform.
#   teardown  Destroys all frontend infrastructure via terraform destroy.
#
# Triggers
#   workflow_call     Called by build-frontend.yml on main to auto-deploy to dev.
#   workflow_dispatch Manually deploy or teardown a specific environment.
#
# Prerequisites
#   The Terraform state backend (S3 bucket + DynamoDB table) must already exist.
#   Run setup-deployment-infrastructure.yml once per environment before the first deploy.
#
# Required secrets/variables — see .github/workflows/README.md.
#   Secrets:   AWS_OIDC_ROLE_ARN   AWS_ACCOUNT_ID
#   Variables: AWS_REGION

name: Deploy Frontend

on:
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
      environment:
        required: true
        type: string

  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to deploy (e.g. frontend-a1b2c3d)"
        required: true
        type: string
      environment:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  TARGET_ENV: ${{ inputs.environment }}
  PROJECT_NAME: breadly

jobs:
  deploy:
    name: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download ${{ inputs.release_tag }} --pattern dist.zip

      - name: Unzip dist
        run: |
          mkdir -p breadly-frontend/dist/browser/
          unzip dist.zip -d breadly-frontend/dist/browser/

      - name: Setup Terraform
        uses: ./.github/actions/terraform-setup
        with:
          working_dir: infrastructure/aws/frontend/deploy
          environment: ${{ env.TARGET_ENV }}
          session_name: github-deploy-frontend-${{ env.TARGET_ENV }}
          aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ${{ vars.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}

      - name: Deploy stack
        uses: ./.github/actions/terraform-action
        with:
          working_dir: infrastructure/aws/frontend/deploy
          environment: ${{ env.TARGET_ENV }}
          extra_tf_vars: >-
            -var="frontend_dist_path=${{ github.workspace }}/breadly-frontend/dist/browser"

      - name: Invalidate CloudFront cache
        working-directory: infrastructure/aws/frontend/deploy
        run: |
          DIST_ID=$(terraform output -raw frontend_cloudfront_distribution_id)
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*"

      - name: Print website URL
        working-directory: infrastructure/aws/frontend/deploy
        run: terraform output -raw frontend_website_url
