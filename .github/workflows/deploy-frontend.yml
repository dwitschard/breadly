# deploy-frontend.yml
#
# Deployment pipeline for the Breadly frontend.
# Deploys the Angular SPA to S3 via Terraform.
#
# Jobs
#   deploy  Download release asset → configure AWS via OIDC → Terraform init/apply
#
# Triggers
#   release (published)   Automatically deploys the new release to dev.
#   workflow_dispatch     Manually deploy a specific release tag to dev or prod.
#
# Required secrets/variables — see .github/workflows/README.md.
#   Secrets:   AWS_OIDC_ROLE_ARN   AWS_ACCOUNT_ID
#   Variables: AWS_REGION

name: Deploy Frontend

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to deploy (e.g. frontend-a1b2c3d)"
        required: true
        type: string
      environment:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy (${{ inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}

    env:
      TARGET_ENV: ${{ inputs.environment || 'dev' }}
      RELEASE_TAG: ${{ inputs.release_tag || github.event.release.tag_name }}
      TF_WORKING_DIR: infrastructure/aws/frontend/infra

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download ${{ env.RELEASE_TAG }} --pattern dist.zip

      - name: Unzip dist
        run: unzip dist.zip -d breadly-frontend/dist/breadly-frontend/browser/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: github-deploy-frontend-${{ env.TARGET_ENV }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Derive backend config
        id: backend
        env:
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          echo "state_bucket=${ACCOUNT_ID}-breadly-${{ env.TARGET_ENV }}-tfstate" >> "$GITHUB_OUTPUT"
          echo "lock_table=breadly-${{ env.TARGET_ENV }}-tfstate-lock"            >> "$GITHUB_OUTPUT"

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ steps.backend.outputs.state_bucket }}" \
            -backend-config="dynamodb_table=${{ steps.backend.outputs.lock_table }}" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      - name: Select Terraform workspace
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform workspace select -or-create ${{ env.TARGET_ENV }}

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
        run: |
          terraform plan \
            -var-file="envs/${{ env.TARGET_ENV }}.tfvars" \
            -var="frontend_dist_path=${{ github.workspace }}/breadly-frontend/dist/breadly-frontend/browser"

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
        run: |
          terraform apply \
            -auto-approve \
            -var-file="envs/${{ env.TARGET_ENV }}.tfvars" \
            -var="frontend_dist_path=${{ github.workspace }}/breadly-frontend/dist/breadly-frontend/browser"

      - name: Print website URL
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform output -raw frontend_website_url
