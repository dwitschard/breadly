# ─────────────────────────────────────────────────────────────────────────────
# deploy-frontend.yml
#
# Deployment pipeline for the Breadly frontend.
# Bootstraps the Terraform remote state backend and deploys the Angular SPA
# to S3 via Terraform. Build and bootstrap run in parallel; deploy waits for
# both to succeed.
#
# Jobs
# ────
#   build      Lint → test → production build → upload dist/ artifact
#   bootstrap  Ensure S3 state bucket + DynamoDB lock table exist
#   deploy     Download artifact → configure AWS via OIDC → Terraform init/apply
#
# Triggers
# ────────
#   push to main          Automatically deploys to the `dev` environment.
#                         Fires when frontend source, infra, or bootstrap
#                         Terraform files change.
#
#   workflow_dispatch     Manual trigger from the GitHub Actions UI.
#                         Exposes an `environment` input (dev | prod) so an
#                         operator can choose the deployment target.
#                         Use this for all production deployments.
#
# Required GitHub Secrets / Variables — see .github/workflows/README.md.
#   Secrets:   AWS_OIDC_ROLE_ARN   AWS_ACCOUNT_ID
#   Variables: AWS_REGION
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - "breadly-frontend/**"
      - "infrastructure/aws/frontend/bootstrap/**"
      - "infrastructure/aws/frontend/infra/**"

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment to deploy to"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

# Prevent concurrent deployments to the same environment.
# A new run will cancel any in-progress run targeting the same ref.
concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  TARGET_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}

jobs:
  # ── Build ──────────────────────────────────────────────────────────────────
  # Runs in parallel with bootstrap. Produces the dist/ artifact consumed by
  # the deploy job.
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: breadly-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: breadly-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: breadly-frontend/dist/breadly-frontend/browser/
          retention-days: 1

  # ── Bootstrap ──────────────────────────────────────────────────────────────
  # Ensures the S3 state bucket and DynamoDB lock table exist for the target
  # environment. Uses a local Terraform backend so it has no dependency on the
  # remote state that it is responsible for creating.
  # Runs in parallel with build.
  bootstrap:
    name: Bootstrap (${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }})
    runs-on: ubuntu-latest

    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}

    env:
      TF_BOOTSTRAP_DIR: infrastructure/aws/frontend/bootstrap

    # Required for the OIDC token that configure-aws-credentials exchanges for
    # short-lived AWS credentials. No static keys are stored anywhere.
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── AWS authentication via OIDC ────────────────────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: github-bootstrap-${{ env.TARGET_ENV }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      # Bootstrap uses a local backend — no remote state bucket is needed yet.
      - name: Terraform init
        working-directory: ${{ env.TF_BOOTSTRAP_DIR }}
        run: terraform init

      # Plan with -detailed-exitcode:
      #   exit 0 → no changes (resources already exist) → skip apply
      #   exit 1 → error
      #   exit 2 → changes pending → apply
      - name: Terraform plan
        id: plan
        working-directory: ${{ env.TF_BOOTSTRAP_DIR }}
        continue-on-error: true
        env:
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_environment: ${{ env.TARGET_ENV }}
        run: |
          terraform plan \
            -detailed-exitcode \
            -out=bootstrap.tfplan \

      # Only runs when plan detected changes (exit code 2).
      # Exit code 0 means resources already exist — apply is skipped.
      - name: Terraform apply
        #if: steps.plan.outputs.exitcode == '2'
        working-directory: ${{ env.TF_BOOTSTRAP_DIR }}
        env:
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_environment: ${{ env.TARGET_ENV }}
        run: terraform apply -auto-approve bootstrap.tfplan

  # ── Deploy ─────────────────────────────────────────────────────────────────
  # Downloads the dist/ artifact and applies the infra Terraform root to
  # sync the built files to S3. Runs only after both build and bootstrap
  # succeed.
  deploy:
    name: Deploy (${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    needs: [build, bootstrap]

    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}

    env:
      TF_WORKING_DIR: infrastructure/aws/frontend/infra

    # Required for the OIDC token that configure-aws-credentials exchanges for
    # short-lived AWS credentials. No static keys are stored anywhere.
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          # Restore into the same relative path that Terraform expects.
          path: breadly-frontend/dist/breadly-frontend/browser/

      # ── AWS authentication via OIDC ────────────────────────────────────────
      # Exchanges the GitHub OIDC token for short-lived AWS credentials by
      # assuming the configured IAM role. No AWS_ACCESS_KEY_ID or
      # AWS_SECRET_ACCESS_KEY secrets are required.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: github-deploy-frontend-${{ env.TARGET_ENV }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      # ── Derive backend resource names ──────────────────────────────────────
      # The state bucket and lock table names follow the same convention as the
      # bootstrap root: <account_id>-breadly-<env>-tfstate and
      # breadly-<env>-tfstate-lock. Deriving them here avoids a dependency on
      # GitHub Variables being set before the first bootstrap run.
      - name: Derive backend config
        id: backend
        env:
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          echo "state_bucket=${ACCOUNT_ID}-breadly-${{ env.TARGET_ENV }}-tfstate" >> "$GITHUB_OUTPUT"
          echo "lock_table=breadly-${{ env.TARGET_ENV }}-tfstate-lock"            >> "$GITHUB_OUTPUT"

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ steps.backend.outputs.state_bucket }}" \
            -backend-config="dynamodb_table=${{ steps.backend.outputs.lock_table }}" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      # ── Terraform workspace ────────────────────────────────────────────────
      # Selects (or creates) the workspace that matches the target environment.
      # Workspaces isolate state and produce workspace-scoped resource names
      # (e.g. breadly-dev-frontend vs breadly-prod-frontend).
      - name: Select Terraform workspace
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform workspace select -or-create ${{ env.TARGET_ENV }}

      # ── Terraform plan ─────────────────────────────────────────────────────
      # Generates an execution plan and prints it to the log. The plan is not
      # saved to a file here; apply re-computes it. This step is kept separate
      # so that a plan failure is clearly distinguishable from an apply failure.
      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          # Sensitive variables are passed as TF_VAR_* environment variables so
          # they never appear in the var-file committed to source control.
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
        run: |
          terraform plan \
            -var-file="envs/${{ env.TARGET_ENV }}.tfvars" \
            -var="frontend_dist_path=${{ github.workspace }}/breadly-frontend/dist/breadly-frontend/browser"

      # ── Terraform apply ────────────────────────────────────────────────────
      # Applies the plan. -auto-approve is intentional in CI: the human
      # approval gate is the workflow_dispatch trigger for prod, or the PR/push
      # review process for dev.
      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
        run: |
          terraform apply \
            -auto-approve \
            -var-file="envs/${{ env.TARGET_ENV }}.tfvars" \
            -var="frontend_dist_path=${{ github.workspace }}/breadly-frontend/dist/breadly-frontend/browser"

      # ── Print deployment URL ───────────────────────────────────────────────
      - name: Print website URL
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform output -raw frontend_website_url
