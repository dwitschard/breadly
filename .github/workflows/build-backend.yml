# build-backend.yml
#
# CI pipeline for the Breadly backend.
# Lints, tests, and produces a production build artifact.
# On main, also creates a GitHub Release and triggers a dev deployment.
#
# Jobs
#   build    Lint → test → build → upload dist artifact
#   release  (main only) Create GitHub Release with backend.zip asset
#   deploy   (main only) Call deploy.yml to deploy to dev
#
# Triggers
#   push              Runs on main when backend source files change.
#   workflow_call     Reusable entry point (used by preview-deploy).
#   workflow_dispatch Manual trigger for re-running CI on demand.

name: Build Backend

on:
  push:
    branches:
      - main
    paths:
      - "breadly-backend/**"
      - "infrastructure/aws/backend/**"
      - "infrastructure/aws/deploy/**"
      - ".github/workflows/build-backend.yml"
      - ".github/workflows/deploy.yml"
      - ".github/actions/**"

  workflow_call:

  workflow_dispatch:

concurrency:
  group: build-backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.sha.outputs.short }}
    defaults:
      run:
        working-directory: breadly-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: breadly-backend/package-lock.json

      - name: Install API spec dependencies
        run: npm ci
        working-directory: breadly-api

      - name: Install dependencies
        run: npm ci

      - name: Generate API types
        run: npm run generate-api

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Write version.json
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            URL="https://github.com/${{ github.repository }}/releases/tag/backend-${{ steps.sha.outputs.short }}"
          else
            URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          fi
          cat > dist/version.json <<EOF
          {"version":"${{ steps.sha.outputs.short }}","releaseUrl":"$URL"}
          EOF

      - name: Install production dependencies only
        run: npm ci --omit=dev

      - name: Create deployment zip
        run: zip -r ../backend.zip dist/ node_modules/ package.json run.sh

      - name: Upload dist artifact
        uses: actions/upload-artifact@v6
        with:
          name: backend-dist
          path: backend.zip
          retention-days: 1

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: backend-dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create backend-${{ needs.build.outputs.short_sha }} backend.zip \
            --title "backend-${{ needs.build.outputs.short_sha }}" \
            --generate-notes

  deploy:
    name: Deploy Dev
    needs: [ build, release ]
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/deploy.yml
    with:
      release_tag: backend-${{ needs.build.outputs.short_sha }}
      environment: dev
    secrets: inherit
