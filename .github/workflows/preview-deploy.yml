# preview-deploy.yml
#
# Deploys a full-stack preview environment for every non-main branch push.
# Each preview environment runs under /preview/<branch-slug>/ on the dedicated
# preview CloudFront distribution, with frontend assets in the shared S3 bucket
# under a /<branch-slug>/ key prefix.
#
# Shared preview infrastructure (API Gateway + S3 bucket + CloudFront) is fully
# isolated from dev. State lives in breadly-preview-tfstate.
#
# Jobs:
#   slugify          Computes the branch slug.
#   build-backend    Reuses build-backend.yml (lint -> test -> build -> artifact).
#   build-frontend   Reuses build-frontend.yml with preview base-href.
#   deploy           terraform apply (gateway + CDN + preview) -> s3 sync -> users -> PR comment.
#
# Triggers
#   push to any branch except main.
#
# Required GitHub environment: preview
#   Secrets: AWS_OIDC_ROLE_ARN, AWS_ACCOUNT_ID, MONGODB_URI,
#            PREVIEW_DEMO_PASSWORD, PREVIEW_ADMIN_PASSWORD
#   Variables: AWS_REGION

name: Preview Deploy

on:
  push:
    branches-ignore:
      - main

concurrency:
  group: preview-${{ github.ref_name }}
  cancel-in-progress: true

env:
  PROJECT_NAME: breadly

jobs:
  # ---------------------------------------------------------------------------
  # Slugify branch name
  # ---------------------------------------------------------------------------
  slugify:
    name: Slugify
    runs-on: ubuntu-latest
    outputs:
      slug: ${{ steps.slug.outputs.slug }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Compute branch slug
        id: slug
        uses: ./.github/actions/slugify-branch
        with:
          branch: ${{ github.ref_name }}

  # ---------------------------------------------------------------------------
  # Build backend (reuses CI workflow)
  # ---------------------------------------------------------------------------
  build-backend:
    name: Build Backend
    needs: [slugify]
    uses: ./.github/workflows/build-backend.yml
    permissions:
      contents: write
      id-token: write
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Build frontend (reuses CI workflow with preview base-href)
  # ---------------------------------------------------------------------------
  build-frontend:
    name: Build Frontend
    needs: [slugify]
    uses: ./.github/workflows/build-frontend.yml
    permissions:
      contents: write
      id-token: write
    with:
      base_href: /preview/${{ needs.slugify.outputs.slug }}/
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Deploy preview environment
  # ---------------------------------------------------------------------------
  deploy-preview:
    name: Deploy Preview
    needs: [slugify, build-backend, build-frontend]
    runs-on: ubuntu-latest
    environment: preview
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download backend artifact
        uses: actions/download-artifact@v8
        with:
          name: backend-dist

      - name: Download frontend artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend-dist/

      # --- Step 1: Deploy shared preview API Gateway + S3 bucket ---

      - name: Setup Terraform (gateway)
        uses: ./.github/actions/terraform-setup
        with:
          working_dir: infrastructure/aws/preview/gateway
          environment: preview
          session_name: github-preview-gateway-${{ needs.slugify.outputs.slug }}
          aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ${{ vars.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}

      - name: Deploy preview gateway
        uses: ./.github/actions/terraform-action
        with:
          working_dir: infrastructure/aws/preview/gateway
          environment: preview

      - name: Get gateway outputs
        id: gw
        working-directory: infrastructure/aws/preview/gateway
        run: |
          echo "api_gateway_url=$(terraform output -raw api_gateway_endpoint)" >> "$GITHUB_OUTPUT"
          echo "preview_bucket=$(terraform output -raw preview_bucket_id)" >> "$GITHUB_OUTPUT"

      # --- Step 2: Deploy preview CDN (ensures CloudFront URL exists for Cognito) ---

      - name: Setup Terraform (CDN)
        uses: ./.github/actions/terraform-setup
        with:
          working_dir: infrastructure/aws/cdn/deploy
          environment: preview
          session_name: github-preview-cdn-${{ needs.slugify.outputs.slug }}
          aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ${{ vars.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}

      - name: Deploy preview CDN
        uses: ./.github/actions/terraform-action
        with:
          working_dir: infrastructure/aws/cdn/deploy
          environment: preview
          extra_tf_vars: >-
            -var="preview_only=true"

      - name: Get CloudFront URL
        id: cf
        working-directory: infrastructure/aws/cdn/deploy
        run: |
          CF_URL=$(terraform output -raw cloudfront_url)
          echo "cloudfront_url=$CF_URL" >> "$GITHUB_OUTPUT"
          DIST_ID=$(terraform output -raw cloudfront_distribution_id)
          echo "distribution_id=$DIST_ID" >> "$GITHUB_OUTPUT"

      # --- Step 3: Deploy per-branch preview stack ---

      - name: Setup Terraform (preview)
        uses: ./.github/actions/terraform-setup
        with:
          working_dir: infrastructure/aws/preview/deploy
          environment: preview
          session_name: github-preview-deploy-${{ needs.slugify.outputs.slug }}
          aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ${{ vars.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}

      - name: Export Terraform secrets
        run: echo "TF_VAR_mongodb_uri=${{ secrets.MONGODB_URI }}" >> "$GITHUB_ENV"

      - name: Deploy preview stack
        uses: ./.github/actions/terraform-action
        with:
          working_dir: infrastructure/aws/preview/deploy
          environment: preview
          workspace: preview-${{ needs.slugify.outputs.slug }}
          extra_tf_vars: >-
            -var="branch_slug=${{ needs.slugify.outputs.slug }}"
            -var="dist_zip_path=${{ github.workspace }}/backend.zip"
            -var="cloudfront_url=${{ steps.cf.outputs.cloudfront_url }}"

      # --- Step 4: Upload frontend assets to shared S3 bucket ---

      - name: Upload frontend to shared S3 bucket
        run: |
          aws s3 sync frontend-dist/ \
            "s3://${{ steps.gw.outputs.preview_bucket }}/${{ needs.slugify.outputs.slug }}/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.json"
          # Upload HTML and JSON with no-cache headers
          aws s3 sync frontend-dist/ \
            "s3://${{ steps.gw.outputs.preview_bucket }}/${{ needs.slugify.outputs.slug }}/" \
            --exclude "*" \
            --include "*.html" \
            --include "*.json" \
            --cache-control "no-cache, no-store, must-revalidate"

      # --- Step 5: Create Cognito users ---

      - name: Get Cognito User Pool ID
        id: cognito
        working-directory: infrastructure/aws/preview/deploy
        run: echo "user_pool_id=$(terraform output -raw cognito_user_pool_id)" >> "$GITHUB_OUTPUT"

      - name: Create user groups
        env:
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
        run: |
          USER_POOL_ID="${{ steps.cognito.outputs.user_pool_id }}"

          # Create groups matching roles.config.ts (idempotent — ignores if already exists)
          aws cognito-idp create-group \
            --user-pool-id "$USER_POOL_ID" \
            --group-name "ADMIN" \
            --description "Full administrative access" || true

          aws cognito-idp create-group \
            --user-pool-id "$USER_POOL_ID" \
            --group-name "USER" \
            --description "Standard user access" || true

          aws cognito-idp create-group \
            --user-pool-id "$USER_POOL_ID" \
            --group-name "PREMIUM_USER" \
            --description "Premium tier user access" || true

      - name: Create demo users and assign groups
        env:
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
        run: |
          USER_POOL_ID="${{ steps.cognito.outputs.user_pool_id }}"

          # --- Demo user (USER group) ---
          aws cognito-idp admin-create-user \
            --user-pool-id "$USER_POOL_ID" \
            --username "demo@breadly.app" \
            --message-action SUPPRESS || true

          aws cognito-idp admin-set-user-password \
            --user-pool-id "$USER_POOL_ID" \
            --username "demo@breadly.app" \
            --password "${{ secrets.PREVIEW_DEMO_PASSWORD }}" \
            --permanent

          aws cognito-idp admin-add-user-to-group \
            --user-pool-id "$USER_POOL_ID" \
            --username "demo@breadly.app" \
            --group-name "USER"

          # --- Admin user (ADMIN group) ---
          aws cognito-idp admin-create-user \
            --user-pool-id "$USER_POOL_ID" \
            --username "admin@breadly.app" \
            --message-action SUPPRESS || true

          aws cognito-idp admin-set-user-password \
            --user-pool-id "$USER_POOL_ID" \
            --username "admin@breadly.app" \
            --password "${{ secrets.PREVIEW_ADMIN_PASSWORD }}" \
            --permanent

          aws cognito-idp admin-add-user-to-group \
            --user-pool-id "$USER_POOL_ID" \
            --username "admin@breadly.app" \
            --group-name "ADMIN"

      # --- Step 6: Invalidate, seed, and comment ---

      - name: Invalidate CloudFront cache for preview path
        env:
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.cf.outputs.distribution_id }}" \
            --paths "/preview/${{ needs.slugify.outputs.slug }}/*"

      - name: Seed data (placeholder)
        run: |
          echo "Seed data step — logic to be implemented."
          echo "When implemented, this step will POST seed data to the preview API."

      - name: Post PR comment
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREVIEW_URL="${{ steps.cf.outputs.cloudfront_url }}/preview/${{ needs.slugify.outputs.slug }}/"
          BODY="## Preview Environment

          Branch \`${{ github.ref_name }}\` has been deployed to a preview environment.

          **URL:** $PREVIEW_URL

          **Demo credentials:**
          | User | Email | Password |
          |------|-------|----------|
          | Demo | \`demo@breadly.app\` | See \`PREVIEW_DEMO_PASSWORD\` secret |
          | Admin | \`admin@breadly.app\` | See \`PREVIEW_ADMIN_PASSWORD\` secret |

          _Updated: $(date -u '+%Y-%m-%d %H:%M UTC')_"

          # Find the open PR for this branch (if any) and post/update a comment
          PR_NUMBER=$(gh pr list --head "${{ github.ref_name }}" --json number --jq '.[0].number // empty')
          if [ -n "$PR_NUMBER" ]; then
            # Update existing preview comment or create a new one
            EXISTING=$(gh pr view "$PR_NUMBER" --json comments --jq '.comments[] | select(.body | startswith("## Preview Environment")) | .databaseId' | head -1)
            if [ -n "$EXISTING" ]; then
              gh api "repos/${{ github.repository }}/issues/comments/$EXISTING" -X PATCH -f body="$BODY"
            else
              gh pr comment "$PR_NUMBER" --body "$BODY"
            fi
          fi

      - name: Write preview URL to job summary
        run: |
          PREVIEW_URL="${{ steps.cf.outputs.cloudfront_url }}/preview/${{ needs.slugify.outputs.slug }}/"
          echo "## Preview Environment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Branch \`${{ github.ref_name }}\` deployed to:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**$PREVIEW_URL**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| User | Email | Group |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Demo | \`demo@breadly.app\` | USER |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Admin | \`admin@breadly.app\` | ADMIN |" >> "$GITHUB_STEP_SUMMARY"
