# preview-deploy.yml
#
# Deploys a full-stack preview environment for every non-main branch push.
# Each preview environment runs under /preview/<branch-slug>/ on the dedicated
# preview CloudFront distribution, with frontend assets in the shared S3 bucket
# under a /<branch-slug>/ key prefix.
#
# Shared preview infrastructure (API Gateway + S3 bucket + CloudFront) is fully
# isolated from dev. State lives in breadly-preview-tfstate.
#
# Jobs:
#   slugify          Computes the branch slug.
#   build-backend    Reuses build-backend.yml (lint -> test -> build -> artifact).
#   build-frontend   Reuses build-frontend.yml with preview base-href.
#   deploy-preview   Reuses deploy-preview-stack.yml (gateway + stack + S3 + users + PR comment).
#   e2e              Runs Playwright E2E tests against the deployed preview.
#
# Triggers
#   push to any branch except main.
#
# Required GitHub environment: preview
#   Secrets: AWS_OIDC_ROLE_ARN, AWS_ACCOUNT_ID, MONGODB_URI,
#            PREVIEW_DEMO_PASSWORD, PREVIEW_ADMIN_PASSWORD
#   Variables: AWS_REGION

name: Preview Deploy

on:
  push:
    branches-ignore:
      - main

concurrency:
  group: preview-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Slugify branch name
  # ---------------------------------------------------------------------------
  slugify:
    name: Slugify
    runs-on: ubuntu-latest
    outputs:
      slug: ${{ steps.slug.outputs.slug }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Compute branch slug
        id: slug
        uses: ./.github/actions/slugify-branch
        with:
          branch: ${{ github.ref_name }}

  # ---------------------------------------------------------------------------
  # Build backend (reuses CI workflow)
  # ---------------------------------------------------------------------------
  build-backend:
    name: Build Backend
    needs: [slugify]
    uses: ./.github/workflows/build-backend.yml
    permissions:
      contents: write
      id-token: write
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Build frontend (reuses CI workflow with preview base-href)
  # ---------------------------------------------------------------------------
  build-frontend:
    name: Build Frontend
    needs: [slugify]
    uses: ./.github/workflows/build-frontend.yml
    permissions:
      contents: write
      id-token: write
    with:
      base_href: /preview/${{ needs.slugify.outputs.slug }}/
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Deploy preview environment (reusable workflow)
  # ---------------------------------------------------------------------------
  deploy-preview:
    name: Deploy Preview
    needs: [slugify, build-backend, build-frontend]
    uses: ./.github/workflows/deploy-preview-stack.yml
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    with:
      slug: ${{ needs.slugify.outputs.slug }}
      post-pr-comment: true
      branch-name: ${{ github.ref_name }}
    secrets: inherit

  # ---------------------------------------------------------------------------
  # End-to-End Tests (Playwright)
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E Tests
    needs: [slugify, deploy-preview]
    runs-on: ubuntu-latest
    environment: preview
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright

      - name: Run E2E tests
        id: e2e-run
        working-directory: e2e
        env:
          E2E_BASE_URL: ${{ needs.deploy-preview.outputs.preview_url }}
          E2E_COGNITO_CLIENT_ID: ${{ needs.deploy-preview.outputs.cognito_client_id }}
          E2E_AWS_REGION: ${{ vars.AWS_REGION }}
          E2E_DEMO_USERNAME: demo@breadly.app
          E2E_DEMO_PASSWORD: ${{ secrets.PREVIEW_DEMO_PASSWORD }}
        run: npx playwright test

      - name: Report E2E results
        if: always()
        uses: ./.github/actions/playwright-report
        with:
          artifact-name: playwright-report-${{ needs.slugify.outputs.slug }}
          base-url: ${{ needs.deploy-preview.outputs.preview_url }}
          post-to-pr: "true"
          branch-name: ${{ github.ref_name }}
