# preview-deploy.yml
#
# Deploys a full-stack preview environment for every non-main branch push.
# Each preview environment runs under /preview/<branch-slug>/ on the dedicated
# preview CloudFront distribution, with its own S3 bucket for frontend assets.
#
# Shared preview infrastructure (API Gateway + CloudFront) is fully isolated
# from dev. State lives in breadly-preview-tfstate.
#
# Jobs:
#   slugify          Computes the branch slug and enforces the 5-preview limit.
#   build-backend    Reuses build-backend.yml (lint -> test -> build -> artifact).
#   build-frontend   Reuses build-frontend.yml with preview base-href.
#   deploy           terraform apply (gateway + CDN + preview + CDN update) -> users -> PR comment.
#
# Triggers
#   push to any branch except main.
#
# Required GitHub environment: preview
#   Secrets: AWS_OIDC_ROLE_ARN, AWS_ACCOUNT_ID, MONGODB_URI,
#            PREVIEW_DEMO_PASSWORD, PREVIEW_ADMIN_PASSWORD
#   Variables: AWS_REGION

name: Preview Deploy

on:
  push:
    branches-ignore:
      - main

concurrency:
  group: preview-${{ github.ref_name }}
  cancel-in-progress: true

env:
  PROJECT_NAME: breadly

jobs:
  # ---------------------------------------------------------------------------
  # Slugify branch name and enforce preview limit
  # ---------------------------------------------------------------------------
  slugify:
    name: Slugify & Check Limit
    runs-on: ubuntu-latest
    environment: preview
    permissions:
      id-token: write
      contents: read
    outputs:
      slug: ${{ steps.slug.outputs.slug }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Compute branch slug
        id: slug
        uses: ./.github/actions/slugify-branch
        with:
          branch: ${{ github.ref_name }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: github-preview-limit-check

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.6"
          terraform_wrapper: false

      - name: Terraform init (preview module)
        working-directory: infrastructure/aws/preview/deploy
        run: |
          terraform init \
            -backend-config="bucket=${{ env.PROJECT_NAME }}-preview-tfstate" \
            -backend-config="dynamodb_table=${{ env.PROJECT_NAME }}-preview-tfstate-lock" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      - name: Enforce 5-preview limit
        working-directory: infrastructure/aws/preview/deploy
        run: |
          SLUG="${{ steps.slug.outputs.slug }}"
          # Count workspaces with prefix 'preview-', excluding the current branch's own workspace
          COUNT=$(terraform workspace list | grep -E '^\s+preview-' | grep -v "preview-${SLUG}" | wc -l | tr -d ' ')
          echo "Active preview workspaces (excluding this branch): $COUNT"
          if [ "$COUNT" -ge 5 ]; then
            echo "ERROR: Maximum of 5 concurrent preview environments reached."
            echo "Delete a branch to free up a slot before deploying this preview."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Build backend (reuses CI workflow)
  # ---------------------------------------------------------------------------
  build-backend:
    name: Build Backend
    needs: [slugify]
    uses: ./.github/workflows/build-backend.yml
    permissions:
      contents: write
      id-token: write
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Build frontend (reuses CI workflow with preview base-href)
  # ---------------------------------------------------------------------------
  build-frontend:
    name: Build Frontend
    needs: [slugify]
    uses: ./.github/workflows/build-frontend.yml
    permissions:
      contents: write
      id-token: write
    with:
      base_href: /preview/${{ needs.slugify.outputs.slug }}/
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Deploy preview environment
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: [slugify, build-backend, build-frontend]
    runs-on: ubuntu-latest
    environment: preview
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download backend artifact
        uses: actions/download-artifact@v8
        with:
          name: backend-dist

      - name: Download frontend artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend-dist/

      # --- Step 1: Deploy shared preview API Gateway ---

      - name: Setup Terraform (gateway)
        uses: ./.github/actions/terraform-setup
        with:
          working_dir: infrastructure/aws/preview/gateway
          environment: preview
          session_name: github-preview-gateway-${{ needs.slugify.outputs.slug }}
          aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ${{ vars.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}

      - name: Deploy preview gateway
        uses: ./.github/actions/terraform-action
        with:
          working_dir: infrastructure/aws/preview/gateway
          environment: preview

      - name: Get API Gateway endpoint
        id: gw
        working-directory: infrastructure/aws/preview/gateway
        run: |
          echo "api_gateway_url=$(terraform output -raw api_gateway_endpoint)" >> "$GITHUB_OUTPUT"

      # --- Step 2: Deploy preview CDN (ensures CloudFront URL exists for Cognito) ---

      - name: Setup Terraform (CDN)
        uses: ./.github/actions/terraform-setup
        with:
          working_dir: infrastructure/aws/cdn/deploy
          environment: preview
          session_name: github-preview-cdn-${{ needs.slugify.outputs.slug }}
          aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ${{ vars.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}

      - name: Deploy preview CDN (initial)
        uses: ./.github/actions/terraform-action
        with:
          working_dir: infrastructure/aws/cdn/deploy
          environment: preview
          extra_tf_vars: >-
            -var="preview_only=true"
            -var="api_gateway_url=${{ steps.gw.outputs.api_gateway_url }}"

      - name: Get CloudFront URL
        id: cf
        working-directory: infrastructure/aws/cdn/deploy
        run: |
          CF_URL=$(terraform output -raw cloudfront_url)
          echo "cloudfront_url=$CF_URL" >> "$GITHUB_OUTPUT"
          DIST_ID=$(terraform output -raw cloudfront_distribution_id)
          echo "distribution_id=$DIST_ID" >> "$GITHUB_OUTPUT"

      # --- Step 3: Deploy per-branch preview stack ---

      - name: Setup Terraform (preview)
        uses: ./.github/actions/terraform-setup
        with:
          working_dir: infrastructure/aws/preview/deploy
          environment: preview
          session_name: github-preview-deploy-${{ needs.slugify.outputs.slug }}
          aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws_region: ${{ vars.AWS_REGION }}
          project_name: ${{ env.PROJECT_NAME }}

      - name: Select or create Terraform workspace
        working-directory: infrastructure/aws/preview/deploy
        run: terraform workspace select -or-create preview-${{ needs.slugify.outputs.slug }}

      - name: Export Terraform secrets
        run: echo "TF_VAR_mongodb_uri=${{ secrets.MONGODB_URI }}" >> "$GITHUB_ENV"

      # NOTE: We do NOT use terraform-action here because it force-selects
      # the workspace to the environment name ("preview"), overriding our
      # per-branch workspace ("preview-<slug>").
      - name: Terraform plan (preview stack)
        id: plan-preview
        working-directory: infrastructure/aws/preview/deploy
        run: |
          set +e
          terraform plan \
            -detailed-exitcode \
            -out=tf.tfplan \
            -var="branch_slug=${{ needs.slugify.outputs.slug }}" \
            -var="dist_zip_path=${{ github.workspace }}/backend.zip" \
            -var="cloudfront_url=${{ steps.cf.outputs.cloudfront_url }}" \
            -var="frontend_dist_path=${{ github.workspace }}/frontend-dist"
          TF_EXIT=$?
          echo "exitcode=$TF_EXIT" >> "$GITHUB_OUTPUT"
          if [ $TF_EXIT -eq 1 ]; then exit 1; fi

      - name: Terraform apply (preview stack)
        if: steps.plan-preview.outputs.exitcode == '2'
        working-directory: infrastructure/aws/preview/deploy
        run: terraform apply -auto-approve tf.tfplan

      - name: Get Cognito User Pool ID
        id: cognito
        working-directory: infrastructure/aws/preview/deploy
        run: echo "user_pool_id=$(terraform output -raw cognito_user_pool_id)" >> "$GITHUB_OUTPUT"

      - name: Create user groups
        env:
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
        run: |
          USER_POOL_ID="${{ steps.cognito.outputs.user_pool_id }}"

          # Create groups matching roles.config.ts (idempotent — ignores if already exists)
          aws cognito-idp create-group \
            --user-pool-id "$USER_POOL_ID" \
            --group-name "ADMIN" \
            --description "Full administrative access" || true

          aws cognito-idp create-group \
            --user-pool-id "$USER_POOL_ID" \
            --group-name "USER" \
            --description "Standard user access" || true

          aws cognito-idp create-group \
            --user-pool-id "$USER_POOL_ID" \
            --group-name "PREMIUM_USER" \
            --description "Premium tier user access" || true

      - name: Create demo users and assign groups
        env:
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
        run: |
          USER_POOL_ID="${{ steps.cognito.outputs.user_pool_id }}"

          # --- Demo user (USER group) ---
          aws cognito-idp admin-create-user \
            --user-pool-id "$USER_POOL_ID" \
            --username "demo@breadly.dev" \
            --message-action SUPPRESS || true

          aws cognito-idp admin-set-user-password \
            --user-pool-id "$USER_POOL_ID" \
            --username "demo@breadly.dev" \
            --password "${{ secrets.PREVIEW_DEMO_PASSWORD }}" \
            --permanent

          aws cognito-idp admin-add-user-to-group \
            --user-pool-id "$USER_POOL_ID" \
            --username "demo@breadly.dev" \
            --group-name "USER"

          # --- Admin user (ADMIN group) ---
          aws cognito-idp admin-create-user \
            --user-pool-id "$USER_POOL_ID" \
            --username "admin@breadly.dev" \
            --message-action SUPPRESS || true

          aws cognito-idp admin-set-user-password \
            --user-pool-id "$USER_POOL_ID" \
            --username "admin@breadly.dev" \
            --password "${{ secrets.PREVIEW_ADMIN_PASSWORD }}" \
            --permanent

          aws cognito-idp admin-add-user-to-group \
            --user-pool-id "$USER_POOL_ID" \
            --username "admin@breadly.dev" \
            --group-name "ADMIN"

      # --- Step 4: Update CDN with all active preview bucket origins ---

      - name: Collect active preview buckets
        id: previews
        working-directory: infrastructure/aws/preview/deploy
        run: |
          PREVIEW_BUCKETS='{}'
          WORKSPACES=$(terraform workspace list | grep -E '^\s+preview-' | sed 's/^[[:space:]]*//' | sed 's/^preview-//' || true)
          for SLUG in $WORKSPACES; do
            terraform workspace select "preview-${SLUG}"
            BUCKET_ID=$(terraform output -raw frontend_bucket_id 2>/dev/null || echo "")
            if [ -n "$BUCKET_ID" ]; then
              BUCKET_ARN=$(terraform output -raw frontend_bucket_arn)
              BUCKET_DOMAIN=$(terraform output -raw frontend_bucket_regional_domain_name)
              PREVIEW_BUCKETS=$(echo "$PREVIEW_BUCKETS" | jq --arg slug "$SLUG" \
                --arg id "$BUCKET_ID" --arg arn "$BUCKET_ARN" --arg domain "$BUCKET_DOMAIN" \
                '. + {($slug): {bucket_id: $id, bucket_arn: $arn, bucket_regional_domain_name: $domain}}')
            fi
          done
          echo "preview_buckets=$PREVIEW_BUCKETS" >> "$GITHUB_OUTPUT"
          echo "Collected preview buckets: $PREVIEW_BUCKETS"

      - name: Update CDN with preview origins
        uses: ./.github/actions/terraform-action
        with:
          working_dir: infrastructure/aws/cdn/deploy
          environment: preview
          extra_tf_vars: >-
            -var="preview_only=true"
            -var="api_gateway_url=${{ steps.gw.outputs.api_gateway_url }}"
            -var='preview_buckets=${{ steps.previews.outputs.preview_buckets }}'

      - name: Invalidate CloudFront cache for preview path
        env:
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.cf.outputs.distribution_id }}" \
            --paths "/preview/${{ needs.slugify.outputs.slug }}/*"

      - name: Seed data (placeholder)
        run: |
          echo "Seed data step — logic to be implemented."
          echo "When implemented, this step will POST seed data to the preview API."

      - name: Post PR comment
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREVIEW_URL="${{ steps.cf.outputs.cloudfront_url }}/preview/${{ needs.slugify.outputs.slug }}/"
          BODY="## Preview Environment

          Branch \`${{ github.ref_name }}\` has been deployed to a preview environment.

          **URL:** $PREVIEW_URL

          **Demo credentials:**
          | User | Email | Password |
          |------|-------|----------|
          | Demo | \`demo@breadly.dev\` | See \`PREVIEW_DEMO_PASSWORD\` secret |
          | Admin | \`admin@breadly.dev\` | See \`PREVIEW_ADMIN_PASSWORD\` secret |

          _Updated: $(date -u '+%Y-%m-%d %H:%M UTC')_"

          # Find the open PR for this branch (if any) and post/update a comment
          PR_NUMBER=$(gh pr list --head "${{ github.ref_name }}" --json number --jq '.[0].number // empty')
          if [ -n "$PR_NUMBER" ]; then
            # Update existing preview comment or create a new one
            EXISTING=$(gh pr view "$PR_NUMBER" --json comments --jq '.comments[] | select(.body | startswith("## Preview Environment")) | .databaseId' | head -1)
            if [ -n "$EXISTING" ]; then
              gh api "repos/${{ github.repository }}/issues/comments/$EXISTING" -X PATCH -f body="$BODY"
            else
              gh pr comment "$PR_NUMBER" --body "$BODY"
            fi
          fi

      - name: Write preview URL to job summary
        run: |
          PREVIEW_URL="${{ steps.cf.outputs.cloudfront_url }}/preview/${{ needs.slugify.outputs.slug }}/"
          echo "## Preview Environment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Branch \`${{ github.ref_name }}\` deployed to:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**$PREVIEW_URL**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| User | Email | Group |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Demo | \`demo@breadly.dev\` | USER |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Admin | \`admin@breadly.dev\` | ADMIN |" >> "$GITHUB_STEP_SUMMARY"
